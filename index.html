<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>7-11 即期品管理</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --primary: #00963c;
    --primary-dark: #006e2c;
    --accent: #ff6600;
    --danger: #e53935;
    --warning: #f57c00;
    --safe: #2e7d32;
    --text: #1a1a1a;
    --sub: #666;
    --border: #e0e0e0;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
  
  /* Header */
  .header{background:var(--primary);color:#fff;padding:16px 20px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,150,60,0.3);}
  .header-top{display:flex;align-items:center;justify-content:space-between;}
  .header h1{font-size:18px;font-weight:700;letter-spacing:0.5px;}
  .header-sub{font-size:11px;opacity:0.85;margin-top:2px;}
  .stats-bar{display:flex;gap:12px;margin-top:12px;}
  .stat-chip{background:rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;}
  .stat-chip.danger{background:rgba(229,57,53,0.85);}
  .stat-chip.warning{background:rgba(245,124,0,0.85);}

  /* Nav Tabs */
  .nav-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:73px;z-index:99;}
  .nav-tab{flex:1;padding:12px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--sub);border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s;}
  .nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .nav-tab svg{display:block;margin:0 auto 3px;}

  /* Pages */
  .page{display:none;padding:16px;}
  .page.active{display:block;}

  /* Cards */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;}
  .card-title{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;}

  /* Product Item */
  .product-item{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;border-left:4px solid var(--safe);}
  .product-item.urgent{border-left-color:var(--danger);}
  .product-item.soon{border-left-color:var(--warning);}
  .product-item.discount{border-left-color:var(--accent);}
  .product-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:#f0f4f0;}
  .product-info{flex:1;min-width:0;}
  .product-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .product-meta{font-size:12px;color:var(--sub);margin-top:3px;}
  .product-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
  .badge-danger{background:#fdecea;color:var(--danger);}
  .badge-warning{background:#fff3e0;color:var(--warning);}
  .badge-safe{background:#e8f5e9;color:var(--safe);}
  .badge-discount{background:#fff0e6;color:var(--accent);}
  .product-actions{display:flex;gap:6px;margin-top:8px;}
  .btn-sm{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);}
  .btn-sm.delete{color:var(--danger);border-color:#fdecea;}
  .btn-sm.sold{color:var(--primary);border-color:#e8f5e9;}

  /* Empty State */
  .empty{text-align:center;padding:40px 20px;color:var(--sub);}
  .empty-icon{font-size:48px;margin-bottom:12px;opacity:0.4;}
  .empty p{font-size:14px;line-height:1.6;}

  /* FAB */
  .fab{position:fixed;bottom:90px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;border:none;box-shadow:0 4px 16px rgba(0,150,60,0.4);cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;}
  .fab:active{transform:scale(0.93);}

  /* Bottom Nav */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:150;padding-bottom:env(safe-area-inset-bottom);}
  .bottom-nav-item{flex:1;padding:10px 4px 8px;text-align:center;font-size:10px;font-weight:600;color:var(--sub);cursor:pointer;transition:color 0.2s;}
  .bottom-nav-item.active{color:var(--primary);}
  .bottom-nav-item svg{display:block;margin:0 auto 3px;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom);}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;}
  .modal-title{font-size:17px;font-weight:700;}
  .modal-close{width:32px;height:32px;border-radius:50%;border:none;background:#f0f0f0;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
  .modal-body{padding:16px 20px 20px;}

  /* Form */
  .form-group{margin-bottom:14px;}
  .form-label{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:6px;display:block;}
  .form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:#fafafa;outline:none;transition:border 0.2s;}
  .form-input:focus{border-color:var(--primary);background:#fff;}
  .form-select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:#fafafa;outline:none;appearance:none;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn-primary{width:100%;padding:15px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:background 0.2s;}
  .btn-primary:active{background:var(--primary-dark);}

  /* Scan Mode */
  .scan-method{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .method-btn{padding:16px;border-radius:12px;border:2px solid var(--border);background:#fafafa;cursor:pointer;text-align:center;transition:all 0.2s;font-size:13px;font-weight:600;color:var(--sub);}
  .method-btn.active{border-color:var(--primary);background:#e8f5e9;color:var(--primary);}
  .method-icon{font-size:28px;display:block;margin-bottom:6px;}

  /* Camera */
  .camera-container{position:relative;width:100%;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:4/3;}
  #videoEl{width:100%;height:100%;object-fit:cover;display:block;}
  .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .scan-frame{width:72%;aspect-ratio:3/1;border:3px solid #fff;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.45);}
  .scan-line{position:absolute;width:90%;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);animation:scanLine 1.8s ease-in-out infinite;}
  @keyframes scanLine{0%,100%{top:30%;}50%{top:70%;}}
  .scan-hint{text-align:center;font-size:13px;color:var(--sub);margin-top:10px;padding:8px;background:#f8f8f8;border-radius:8px;}
  .scan-status{text-align:center;padding:10px;font-size:13px;font-weight:600;border-radius:8px;margin-top:8px;}
  .scan-status.detecting{background:#e8f5e9;color:var(--primary);}
  .scan-status.found{background:#e8f5e9;color:var(--primary);}
  .scan-status.error{background:#fdecea;color:var(--danger);}
  .scan-status.notfound{background:#fff3e0;color:var(--warning);}

  /* Start Camera Btn */
  .camera-start-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
  .camera-placeholder{background:#1a1a2e;border-radius:12px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:12px;}
  .camera-placeholder svg{opacity:0.6;}
  .camera-placeholder p{font-size:14px;opacity:0.7;}

  /* Search Result */
  .search-result{border:2px solid var(--primary);border-radius:12px;padding:14px;background:#e8f5e9;margin-bottom:12px;}
  .search-result-name{font-size:16px;font-weight:700;color:var(--primary);}
  .search-result-meta{font-size:12px;color:var(--sub);margin-top:4px;}
  .search-result-barcode{font-size:11px;color:var(--sub);margin-top:2px;font-family:monospace;}

  /* Calendar */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-nav{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .cal-month{font-size:17px;font-weight:700;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--sub);padding:4px 0;}
  .cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;position:relative;border:1.5px solid transparent;transition:all 0.15s;}
  .cal-day:empty{cursor:default;}
  .cal-day.today{background:var(--primary);color:#fff;}
  .cal-day.has-items{background:#e8f5e9;}
  .cal-day.has-urgent{background:#fdecea;color:var(--danger);}
  .cal-day.has-soon{background:#fff3e0;color:var(--warning);}
  .cal-day.selected{border-color:var(--primary);box-shadow:0 0 0 2px rgba(0,150,60,0.3);}
  .cal-dot{width:5px;height:5px;border-radius:50%;background:var(--primary);margin-top:2px;}
  .cal-day-detail{margin-top:14px;}

  /* Discount Zone */
  .discount-card{background:linear-gradient(135deg,#ff6600,#ff8c00);border-radius:var(--radius);padding:16px;color:#fff;margin-bottom:12px;}
  .discount-badge{display:inline-block;background:rgba(255,255,255,0.25);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;margin-bottom:6px;}
  .discount-pct{font-size:32px;font-weight:900;}
  .discount-name{font-size:15px;font-weight:600;opacity:0.95;}
  .discount-exp{font-size:12px;opacity:0.8;margin-top:4px;}

  /* Reminder */
  .reminder-section{margin-bottom:16px;}
  .reminder-section-title{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .reminder-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

  /* Filter Tabs */
  .filter-tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
  .filter-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
  .filter-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  /* Toast */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Search bar */
  .search-bar{display:flex;gap:8px;margin-bottom:14px;}
  .search-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:24px;font-size:14px;background:#fff;outline:none;}
  .search-input:focus{border-color:var(--primary);}

  /* Error helper */
  .error-box{background:#fdecea;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--danger);line-height:1.6;margin-top:10px;}
  .error-box strong{display:block;margin-bottom:4px;}

  /* Qty stepper */
  .qty-stepper{display:flex;align-items:center;gap:10px;}
  .qty-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .qty-val{font-size:18px;font-weight:700;min-width:32px;text-align:center;}

  @media(prefers-color-scheme:dark){
    :root{--bg:#111;--card:#1e1e1e;--border:#333;--text:#f0f0f0;--sub:#888;}
    .nav-tabs,.bottom-nav{background:#1e1e1e;}
    .form-input,.form-select,.search-input{background:#2a2a2a;color:#f0f0f0;}
    .modal{background:#1e1e1e;}
    .method-btn{background:#2a2a2a;}
    .method-btn.active{background:#1a3320;}
    .camera-placeholder{background:#0a0a1e;}
    .btn-sm{background:#2a2a2a;color:#f0f0f0;}
    .cal-day.has-items{background:#1a3320;}
    .scan-hint{background:#2a2a2a;}
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>7-ELEVEN 即期品管理</h1>
      <div class="header-sub" id="headerDate"></div>
    </div>
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="white" opacity="0.2"/>
      <text x="14" y="20" text-anchor="middle" fill="white" font-size="16" font-weight="900">7</text>
    </svg>
  </div>
  <div class="stats-bar" id="statsBar">
    <div class="stat-chip" id="statTotal">共 0 件</div>
    <div class="stat-chip danger" id="statUrgent" style="display:none"></div>
    <div class="stat-chip warning" id="statSoon" style="display:none"></div>
  </div>
</div>

<!-- Nav Tabs -->
<div class="nav-tabs">
  <div class="nav-tab active" onclick="switchPage('list')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
    清單
  </div>
  <div class="nav-tab" onclick="switchPage('calendar')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    行事曆
  </div>
  <div class="nav-tab" onclick="switchPage('discount')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="9" cy="9" r="2.5"/><circle cx="15" cy="15" r="2.5"/><line x1="5" y1="19" x2="19" y2="5"/></svg>
    打折專區
  </div>
  <div class="nav-tab" onclick="switchPage('reminder')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    提醒
  </div>
</div>

<!-- LIST PAGE -->
<div class="page active" id="page-list">
  <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;">
    <input class="search-input" id="searchInput" placeholder="搜尋商品名稱..." oninput="renderList()"/>
  </div>
  <div class="filter-tabs">
    <div class="filter-tab active" onclick="setFilter('all',this)">全部</div>
    <div class="filter-tab" onclick="setFilter('urgent',this)">今日到期</div>
    <div class="filter-tab" onclick="setFilter('soon',this)">7天內</div>
    <div class="filter-tab" onclick="setFilter('safe',this)">安全</div>
    <div class="filter-tab" onclick="setFilter('drink',this)">飲料</div>
    <div class="filter-tab" onclick="setFilter('food',this)">食品</div>
    <div class="filter-tab" onclick="setFilter('snack',this)">零食</div>
  </div>
  <div id="productList"></div>
</div>

<!-- CALENDAR PAGE -->
<div class="page" id="page-calendar">
  <div class="card">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">&#8249;</button>
      <div class="cal-month" id="calMonth"></div>
      <button class="cal-nav" onclick="calNav(1)">&#8250;</button>
    </div>
    <div class="cal-grid" id="calDow"></div>
    <div class="cal-grid" id="calGrid" style="margin-top:4px;"></div>
  </div>
  <div id="calDetail"></div>
</div>

<!-- DISCOUNT PAGE -->
<div class="page" id="page-discount">
  <div class="card" style="background:linear-gradient(135deg,#ff6600,#e55000);color:#fff;border:none;">
    <div style="font-size:13px;opacity:0.85;margin-bottom:4px;">即期品打折建議</div>
    <div style="font-size:22px;font-weight:800;">依到期天數自動計算折扣</div>
    <div style="font-size:12px;opacity:0.75;margin-top:6px;">今日~7天 5折 / 8~15天 7折 / 16~30天 9折</div>
  </div>
  <div id="discountList"></div>
</div>

<!-- REMINDER PAGE -->
<div class="page" id="page-reminder">
  <div id="reminderList"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bottom-nav-item active" id="nav-list" onclick="switchPage('list')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
    清單
  </div>
  <div class="bottom-nav-item" id="nav-calendar" onclick="switchPage('calendar')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    行事曆
  </div>
  <div class="bottom-nav-item" id="nav-discount" onclick="switchPage('discount')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="2.5"/><circle cx="15" cy="15" r="2.5"/><line x1="5" y1="19" x2="19" y2="5"/></svg>
    打折
  </div>
  <div class="bottom-nav-item" id="nav-reminder" onclick="switchPage('reminder')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    提醒
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">新增即期品</div>
      <button class="modal-close" onclick="closeModal('addModal')">&#10005;</button>
    </div>
    <div class="modal-body">
      <!-- Method Switch -->
      <div class="scan-method">
        <div class="method-btn active" id="methodScanBtn" onclick="setMethod('scan')">
          <span class="method-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="9" y1="10" x2="9" y2="14"/><line x1="12" y1="10" x2="12" y2="14"/><line x1="15" y1="10" x2="15" y2="14"/><line x1="18" y1="10" x2="18" y2="14"/></svg>
          </span>
          掃描條碼
        </div>
        <div class="method-btn" id="methodManualBtn" onclick="setMethod('manual')">
          <span class="method-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </span>
          手動輸入
        </div>
      </div>

      <!-- Scan Section -->
      <div id="scanSection">
        <div id="cameraArea">
          <div class="camera-placeholder" id="cameraPlaceholder">

// Alias lookup by partial barcode
function lookupProduct(barcode) {
  const code = barcode.trim();
  if (PRODUCT_DB[code]) return {...PRODUCT_DB[code], barcode: code};
  // Try last 13 digits
  const trimmed = code.replace(/^0+/,'');
  for (const [k,v] of Object.entries(PRODUCT_DB)) {
    if (k.replace(/^0+/,'') === trimmed) return {...v, barcode: k};
  }
  return null;
}

// Category icons (SVG-safe text labels)
function getCatIcon(cat) {
  const map = {drink:'Drink', food:'Food', snack:'Snack', bread:'Bread', dairy:'Dairy', daily:'Daily', other:'Item'};
  return map[cat] || 'Item';
}

function getCatColor(cat) {
  const map = {drink:'#1565c0', food:'#388e3c', snack:'#f57c00', bread:'#6a1b9a', dairy:'#00838f', daily:'#5d4037', other:'#546e7a'};
  return map[cat] || '#546e7a';
}

function getDaysLeft(expiry) {
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(expiry); exp.setHours(0,0,0,0);
  return Math.round((exp - today) / 86400000);
}

function urgencyClass(days) {
  if (days <= 0) return 'urgent';
  if (days <= 7) return 'soon';
  return '';
}

function badgeInfo(days) {
  if (days < 0) return {cls:'badge-danger', label:`已過期 ${Math.abs(days)} 天`};
  if (days === 0) return {cls:'badge-danger', label:'今日到期'};
  if (days <= 7) return {cls:'badge-warning', label:`${days} 天後到期`};
  if (days <= 30) return {cls:'badge-discount', label:`${days} 天後到期`};
  return {cls:'badge-safe', label:`${days} 天後到期`};
}

function discountPct(days) {
  if (days <= 0) return 50;
  if (days <= 3) return 50;
  if (days <= 7) return 60;
  if (days <= 15) return 70;
  if (days <= 30) return 90;
  return null;
}

// =============================================
function switchPage(p) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-tab')[['list','calendar','discount','reminder'].indexOf(p)]?.classList.add('active');
  document.getElementById('nav-'+p)?.classList.add('active');
  if (p==='list') renderList();
  if (p==='calendar') renderCalendar();
  if (p==='discount') renderDiscount();
  if (p==='reminder') renderReminder();
  updateStats();
}

// =============================================
// STATS
// =============================================
function updateStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  document.getElementById('statTotal').textContent = `共 ${products.length} 件`;
  const urgent = products.filter(p=>getDaysLeft(p.expiry)<=0).length;
  const soon = products.filter(p=>{const d=getDaysLeft(p.expiry);return d>0&&d<=7;}).length;
  const el1 = document.getElementById('statUrgent');
  const el2 = document.getElementById('statSoon');
  el1.style.display = urgent>0?'':'none';
  el2.style.display = soon>0?'':'none';
  if (urgent>0) el1.textContent = `今日到期 ${urgent} 件`;
  if (soon>0) el2.textContent = `7天內 ${soon} 件`;
  const dateEl = document.getElementById('headerDate');
  const d = new Date();
  dateEl.textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  let list = [...products];
  if (q) list = list.filter(p=>p.name.toLowerCase().includes(q)||p.barcode?.includes(q));
  if (currentFilter==='urgent') list = list.filter(p=>getDaysLeft(p.expiry)<=0);
  else if (currentFilter==='soon') list = list.filter(p=>{const d=getDaysLeft(p.expiry);return d>0&&d<=7;});
  else if (currentFilter==='safe') list = list.filter(p=>getDaysLeft(p.expiry)>7);
  else if (['drink','food','snack','bread','dairy','daily'].includes(currentFilter)) list = list.filter(p=>p.cat===currentFilter);
  list.sort((a,b)=>new Date(a.expiry)-new Date(b.expiry));
  const el = document.getElementById('productList');
  if (!list.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">-</div><p>目前沒有符合的即期品紀錄<br>點擊右下角 + 新增</p></div>`; return; }
  el.innerHTML = list.map(p=>{
    const days = getDaysLeft(p.expiry);
    const badge = badgeInfo(days);
    const urg = urgencyClass(days);
    const disc = discountPct(days);
    return `<div class="product-item ${urg}${disc?' discount':''}">
      <div class="product-icon" style="background:${getCatColor(p.cat)}22;color:${getCatColor(p.cat)};font-size:11px;font-weight:700;">${getCatIcon(p.cat)}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-meta">${p.expiry} | 數量: ${p.qty}${p.note?' | '+p.note:''}</div>
        ${disc?`<div style="font-size:11px;color:var(--accent);font-weight:700;margin-top:2px;">建議折扣: ${disc}折</div>`:''}
        <div class="product-actions">
          <button class="btn-sm sold" onclick="markSold('${p.id}')">已售出</button>
          <button class="btn-sm delete" onclick="deleteProduct('${p.id}')">刪除</button>
        </div>
      </div>
      <div class="product-badge ${badge.cls}">${badge.label}</div>
    </div>`;
  }).join('');
}

function markSold(id) { products = products.filter(p=>p.id!==id); saveProducts(); renderList(); updateStats(); showToast('已標記為售出'); }
function deleteProduct(id) { if (!confirm('確定刪除？')) return; products = products.filter(p=>p.id!==id); saveProducts(); renderList(); updateStats(); showToast('已刪除'); }

// =============================================
// CALENDAR
// =============================================
function renderCalendar() {
  const dows = ['日','一','二','三','四','五','六'];
  document.getElementById('calDow').innerHTML = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  document.getElementById('calMonth').textContent = `${calYear} 年 ${calMonth+1} 月`;
  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '';
  for (let i=0;i<first;i++) html+=`<div class="cal-day"></div>`;
  for (let d=1;d<=days;d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayItems = products.filter(p=>p.expiry===dateStr);
    const isToday = new Date(calYear,calMonth,d).getTime()===today.getTime();
    const hasUrgent = dayItems.some(p=>getDaysLeft(p.expiry)<=0);
    const hasSoon = dayItems.some(p=>{const dd=getDaysLeft(p.expiry);return dd>0&&dd<=7;});
    let cls = 'cal-day';
    if (isToday) cls+=' today';
    else if (hasUrgent) cls+=' has-urgent';
    else if (hasSoon) cls+=' has-soon';
    else if (dayItems.length) cls+=' has-items';
    if (calSelected===dateStr) cls+=' selected';
    html+=`<div class="${cls}" onclick="selectCalDay('${dateStr}')">${d}${dayItems.length?'<div class="cal-dot"></div>':''}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  if (calSelected) renderCalDetail(calSelected);
}

function calNav(dir) { calMonth+=dir; if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function selectCalDay(date) {
  calSelected = calSelected===date ? null : date;
  renderCalendar();
}

function renderCalDetail(date) {
  const items = products.filter(p=>p.expiry===date);
  const el = document.getElementById('calDetail');
  if (!items.length) { el.innerHTML=`<div class="card"><p style="color:var(--sub);text-align:center;font-size:14px;">${date} 無登錄即期品</p></div>`; return; }
  el.innerHTML=`<div class="card"><div class="card-title">${date} 的即期品</div>${items.map(p=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
      <div style="font-size:11px;font-weight:700;color:${getCatColor(p.cat)};background:${getCatColor(p.cat)}22;padding:4px 8px;border-radius:6px;">${getCatIcon(p.cat)}</div>
      <div style="flex:1;font-size:14px;font-weight:600;">${p.name}</div>
      <div style="font-size:12px;color:var(--sub);">x${p.qty}</div>
    </div>`).join('')}</div>`;
}

// =============================================
// DISCOUNT PAGE
// =============================================
function renderDiscount() {
  const list = products.filter(p=>discountPct(getDaysLeft(p.expiry))!==null).sort((a,b)=>getDaysLeft(a.expiry)-getDaysLeft(b.expiry));
  const el = document.getElementById('discountList');
  if (!list.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">-</div><p>目前沒有需要打折的即期品<br>（30天內到期才會顯示）</p></div>`; return; }
  el.innerHTML = list.map(p=>{
    const days = getDaysLeft(p.expiry);
    const pct = discountPct(days);
    return `<div class="discount-card">
      <div class="discount-badge">${days<=0?'已過期':days===0?'今日到期':days+'天後到期'}</div>
      <div style="display:flex;align-items:baseline;gap:8px;">
        <div class="discount-pct">${pct}折</div>
        <div style="font-size:13px;opacity:0.85;">建議售價</div>
      </div>
      <div class="discount-name">${p.name}</div>
      <div class="discount-exp">數量: ${p.qty} | 到期: ${p.expiry}</div>
    </div>`;
  }).join('');
}

// =============================================
// REMINDER PAGE
// =============================================
function renderReminder() {
  const today = products.filter(p=>getDaysLeft(p.expiry)<=0).sort((a,b)=>getDaysLeft(a.expiry)-getDaysLeft(b.expiry));
  const week = products.filter(p=>{const d=getDaysLeft(p.expiry);return d>0&&d<=7;}).sort((a,b)=>getDaysLeft(a.expiry)-getDaysLeft(b.expiry));
  const month = products.filter(p=>{const d=getDaysLeft(p.expiry);return d>7&&d<=30;}).sort((a,b)=>getDaysLeft(a.expiry)-getDaysLeft(b.expiry));
  const el = document.getElementById('reminderList');
  let html = '';
  function section(title, color, items, emptyMsg) {
    return `<div class="reminder-section">
      <div class="reminder-section-title"><div class="reminder-dot" style="background:${color};"></div>${title}</div>
      ${items.length ? items.map(p=>{
        const days=getDaysLeft(p.expiry);
        const badge=badgeInfo(days);
        return `<div class="product-item ${days<=0?'urgent':days<=7?'soon':''}">
          <div class="product-icon" style="background:${getCatColor(p.cat)}22;color:${getCatColor(p.cat)};font-size:11px;font-weight:700;">${getCatIcon(p.cat)}</div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-meta">到期: ${p.expiry} | 數量: ${p.qty}</div>
          </div>
          <div class="product-badge ${badge.cls}">${badge.label}</div>
        </div>`;
      }).join('') : `<div style="color:var(--sub);font-size:13px;padding:8px 0 4px;">${emptyMsg}</div>`}
    </div>`;
  }
  html += section('今日及已過期（請立即處理）','#e53935',today,'目前無今日到期品');
  html += section('7天內到期（建議打折）','#f57c00',week,'目前無7天內到期品');
  html += section('30天內到期（提前留意）','#388e3c',month,'目前無30天內到期品');
  el.innerHTML = html || `<div class="empty"><p>目前沒有需要提醒的即期品</p></div>`;
}

// =============================================
// MODAL
// =============================================
function openAddModal() {
  document.getElementById('addModal').classList.add('open');
  setMethod('scan');
  resetScanUI();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  stopCamera();
}

document.getElementById('addModal').addEventListener('click', function(e){
  if(e.target===this) closeModal('addModal');
});

// =============================================
// METHOD SWITCH
// =============================================
function setMethod(m) {
  const isScan = m==='scan';
  document.getElementById('methodScanBtn').classList.toggle('active',isScan);
  document.getElementById('methodManualBtn').classList.toggle('active',!isScan);
  document.getElementById('scanSection').style.display = isScan?'':'none';
  document.getElementById('manualSection').style.display = isScan?'none':'';
  if (!isScan) { stopCamera(); resetScanUI(); }
  // Set default date to today for manual
  if (!isScan) {
    const today = new Date();
    const dateStr = today.toISOString().split('T')[0];
    document.getElementById('manualExpiry').value = dateStr;
  }
}

// =============================================
// CAMERA & SCAN (iOS Compatible)
// =============================================
async function startCamera() {
  const btn = document.getElementById('startCameraBtn');
  btn.textContent = '啟動中...';
  btn.disabled = true;
  document.getElementById('scanError').style.display='none';

  const constraints = [
    { video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
    { video: { facingMode: 'environment' } },
    { video: { facingMode: 'user' } },
    { video: true }
  ];

  let stream = null;
  let lastError = null;

  for (const c of constraints) {
    try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
    catch(e) { lastError = e; }
  }

  if (!stream) {
    showCameraError(lastError);
    btn.textContent = '啟動相機開始掃描';
    btn.disabled = false;
    return;
  }

  videoStream = stream;
  const video = document.getElementById('videoEl');
  video.srcObject = stream;
  video.setAttribute('playsinline','true');
  video.setAttribute('muted','true');

  try { await video.play(); } catch(e) { console.warn('video.play():', e); }

  document.getElementById('cameraPlaceholder').style.display = 'none';
  document.getElementById('cameraContainer').style.display = 'block';
  document.getElementById('startCameraBtn').style.display = 'none';
  document.getElementById('stopCameraBtn').style.display = 'block';
  document.getElementById('scanStatus').style.display = 'block';
  document.getElementById('scanStatus').className = 'scan-status detecting';
  document.getElementById('scanStatus').textContent = '掃描中... 請將條碼對準框內';

  scanLoopActive = true;
  scanLoop();
}

function stopCamera() {
  scanLoopActive = false;
  if (videoStream) { videoStream.getTracks().forEach(t=>t.stop()); videoStream = null; }
  const video = document.getElementById('videoEl');
  video.srcObject = null;
  document.getElementById('cameraContainer').style.display = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'flex';
  document.getElementById('startCameraBtn').style.display = 'block';
  document.getElementById('startCameraBtn').textContent = '啟動相機開始掃描';
  document.getElementById('startCameraBtn').disabled = false;
  document.getElementById('stopCameraBtn').style.display = 'none';
  document.getElementById('scanStatus').style.display = 'none';
}

function scanLoop() {
  if (!scanLoopActive) return;
  const video = document.getElementById('videoEl');
  if (!video.videoWidth || !video.videoHeight) { requestAnimationFrame(scanLoop); return; }
  const canvas = document.getElementById('snapCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  
  let code = null;
  try { code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' }); } catch(e){}
  
  if (code && code.data) {
    handleBarcodeDetected(code.data);
    return; // stop loop after detection
  }
  requestAnimationFrame(scanLoop);
}

function handleBarcodeDetected(barcode) {
  scanLoopActive = false; // pause loop
  const statusEl = document.getElementById('scanStatus');
  statusEl.className = 'scan-status found';
  statusEl.textContent = '條碼偵測到: ' + barcode;

  const product = lookupProduct(barcode);
  if (product) {
    showScanResult(product, barcode);
  } else {
    // Not in DB — show manual fill with barcode pre-filled
    showScanNotFound(barcode);
  }
}

function showScanResult(product, barcode) {
  stopCamera();
  currentScanProduct = product;
  const preview = document.getElementById('scanResultPreview');
  const card = document.getElementById('scanResultCard');
  card.innerHTML = `
    <div class="search-result-name">${product.name}</div>
    <div class="search-result-meta">分類: ${getCatIcon(product.cat)}</div>
    <div class="search-result-barcode">條碼: ${barcode}</div>
  `;
  const today = new Date();
  document.getElementById('scanExpiry').value = today.toISOString().split('T')[0];
  preview.style.display = 'block';
  document.getElementById('startCameraBtn').style.display = 'none';
  document.getElementById('stopCameraBtn').style.display = 'none';
  document.getElementById('scanHint').style.display = 'none';
  document.getElementById('scanStatus').className = 'scan-status found';
  document.getElementById('scanStatus').textContent = '商品辨識成功！請設定到期日';
}

function showScanNotFound(barcode) {
  stopCamera();
  const statusEl = document.getElementById('scanStatus');
  statusEl.className = 'scan-status notfound';
  statusEl.textContent = '條碼: ' + barcode + '（資料庫無此商品，請手動填寫）';
  // switch to manual, prefill barcode
  setMethod('manual');
  document.getElementById('manualBarcode').value = barcode;
  document.getElementById('manualName').focus();
  showToast('請手動輸入商品名稱');
}

function showCameraError(err) {
  const el = document.getElementById('scanError');
  el.style.display = 'block';
  let msg = '相機啟動失敗';
  let detail = '';
  if (err) {
    if (err.name==='NotAllowedError'||err.name==='PermissionDeniedError') {
      msg = '相機權限被拒絕';
      detail = '請至「設定 > Safari > 相機」選擇「允許」，然後重新整理頁面再試一次。';
    } else if (err.name==='NotFoundError') {
      msg = '找不到相機裝置';
      detail = '請確認裝置有相機，或換一個瀏覽器試試。';
    } else if (err.name==='NotSupportedError') {
      msg = '瀏覽器不支援相機';
      detail = '請使用 iOS Safari 或 Android Chrome，並確認網址為 HTTPS。';
    } else {
      detail = err.message || '未知錯誤';
    }
  }
  el.innerHTML = `<div class="error-box"><strong>${msg}</strong>${detail}</div>`;
}

function resetScan() {
  currentScanProduct = null;
  document.getElementById('scanResultPreview').style.display = 'none';
  document.getElementById('scanHint').style.display = 'block';
  document.getElementById('scanStatus').style.display = 'none';
  document.getElementById('scanError').style.display = 'none';
  document.getElementById('startCameraBtn').style.display = 'block';
  document.getElementById('startCameraBtn').textContent = '啟動相機開始掃描';
  document.getElementById('startCameraBtn').disabled = false;
  document.getElementById('stopCameraBtn').style.display = 'none';
  document.getElementById('cameraContainer').style.display = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'flex';
}

function resetScanUI() {
  resetScan();
  document.getElementById('scanQtyVal').textContent = '1';
  document.getElementById('scanExpiry').value = '';
  document.getElementById('scanNote').value = '';
  scanQty = 1;
}

// =============================================
// ADD PRODUCT
// =============================================
function addScannedProduct() {
  if (!currentScanProduct) return;
  const expiry = document.getElementById('scanExpiry').value;
  if (!expiry) { showToast('請選擇到期日'); return; }
  const qty = parseInt(document.getElementById('scanQtyVal').textContent)||1;
  const note = document.getElementById('scanNote').value.trim();
  products.push({
    id: Date.now()+'',
    name: currentScanProduct.name,
    cat: currentScanProduct.cat,
    barcode: currentScanProduct.barcode,
    expiry, qty, note
  });
  saveProducts(); updateStats(); renderList();
  closeModal('addModal');
  showToast('新增成功: ' + currentScanProduct.name);
}

function addManualProduct() {
  const name = document.getElementById('manualName').value.trim();
  const expiry = document.getElementById('manualExpiry').value;
  const cat = document.getElementById('manualCat').value;
  const barcode = document.getElementById('manualBarcode').value.trim();
  const qty = parseInt(document.getElementById('manualQtyVal').textContent)||1;
  const note = document.getElementById('manualNote').value.trim();
  if (!name) { showToast('請輸入商品名稱'); return; }
  if (!expiry) { showToast('請選擇到期日'); return; }
  products.push({ id:Date.now()+'', name, cat, barcode, expiry, qty, note });
  saveProducts(); updateStats(); renderList();
  closeModal('addModal');
  showToast('已新增: ' + name);
  document.getElementById('manualName').value='';
  document.getElementById('manualBarcode').value='';
  document.getElementById('manualNote').value='';
  document.getElementById('manualQtyVal').textContent='1';
  manualQty=1;
}

// =============================================
// QTY STEPPER
// =============================================
function adjustQty(dir, field) {
  if (field==='scanQty') {
    scanQty = Math.max(1, (scanQty||1)+dir);
    document.getElementById('scanQtyVal').textContent = scanQty;
  } else {
    manualQty = Math.max(1, (manualQty||1)+dir);
    document.getElementById('manualQtyVal').textContent = manualQty;
  }
}

// =============================================
// TOAST
// =============================================
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// =============================================
// INIT
// =============================================
updateStats();
renderList();
renderCalendar();
</script>
