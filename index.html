<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7-11 即期品追蹤</title>
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <style>
    :root {
      --green: #007b40;
      --orange: #f26522;
      --light: #f9f9f9;
      --white: #ffffff;
      --shadow: 0 2px 12px rgba(0,0,0,0.10);
      --radius: 14px;
      --red: #e74c3c;
      --yellow: #f7c948;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--light);
      color: #222;
      min-height: 100vh;
    }
    header {
      background: var(--green);
      color: white;
      padding: 18px 20px 14px;
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 2px;
      box-shadow: var(--shadow);
    }
    header span { color: var(--orange); }

    nav {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #eee;
      overflow-x: auto;
    }
    nav button {
      flex: 1;
      min-width: 80px;
      padding: 12px 6px;
      border: none;
      background: none;
      font-size: 0.92rem;
      color: #666;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    nav button.active {
      color: var(--green);
      border-bottom: 3px solid var(--green);
      font-weight: bold;
    }

    .tab { display: none; padding: 18px 14px; }
    .tab.active { display: block; }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .card h3 { font-size: 1rem; color: var(--green); margin-bottom: 10px; }

    input[type="text"], input[type="date"], input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.97rem;
      margin-bottom: 10px;
      background: #fafafa;
      transition: border 0.2s;
    }
    input:focus { outline: none; border-color: var(--green); }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-green { background: var(--green); color: white; }
    .btn-orange { background: var(--orange); color: white; }
    .btn-red { background: var(--red); color: white; }
    .btn-gray { background: #bbb; color: white; margin-top: 8px; }

    /* ===== 相機區塊 ===== */
    #camera-section {
      display: none;
      margin-top: 12px;
    }
    #camera-section.show { display: block; }

    #camera-permission-box {
      background: #fff8e1;
      border: 1.5px dashed var(--orange);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      margin-bottom: 12px;
    }
    #camera-permission-box p {
      font-size: 0.93rem;
      color: #555;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    #video-wrapper {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      display: none;
    }
    #video-wrapper.show { display: block; }

    #scanner-video {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
    }

    .scan-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 120px;
      border: 3px solid var(--orange);
      border-radius: 10px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
      pointer-events: none;
    }
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--orange);
      animation: scanMove 2s linear infinite;
    }
    @keyframes scanMove {
      0% { top: 0; } 100% { top: 100%; }
    }

    #scan-status {
      text-align: center;
      font-size: 0.88rem;
      color: var(--green);
      margin-top: 8px;
      min-height: 20px;
    }
    #scan-status.error { color: var(--red); }

    /* ===== 商品列表 ===== */
    .product-item {
      background: #fff;
      border-radius: 10px;
      padding: 13px 14px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      border-left: 5px solid var(--green);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .product-item.warning { border-left-color: var(--yellow); }
    .product-item.urgent { border-left-color: var(--red); }
    .product-item.discount { border-left-color: var(--orange); }

    .product-info { flex: 1; }
    .product-info .name { font-weight: bold; font-size: 0.97rem; }
    .product-info .barcode { font-size: 0.78rem; color: #aaa; }
    .product-info .date { font-size: 0.85rem; color: #666; margin-top: 2px; }
    .product-info .days-left { font-size: 0.82rem; margin-top: 2px; }
    .days-left.ok { color: var(--green); }
    .days-left.warn { color: #e67e22; }
    .days-left.urgent { color: var(--red); font-weight: bold; }

    .product-actions button {
      border: none;
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      margin-left: 4px;
    }
    .del-btn { background: #fee; color: var(--red); }
    .discount-btn { background: #fff3e0; color: var(--orange); }

    /* ===== 行事曆 ===== */
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .calendar-header button {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 1rem;
      cursor: pointer;
    }
    .calendar-header span { font-weight: bold; font-size: 1rem; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-day-label {
      text-align: center;
      font-size: 0.78rem;
      color: #888;
      padding: 4px 0;
      font-weight: bold;
    }
    .cal-day {
      min-height: 40px;
      border-radius: 8px;
      padding: 4px 3px;
      font-size: 0.82rem;
      text-align: center;
      background: #f4f4f4;
      position: relative;
      cursor: default;
    }
    .cal-day.today { background: var(--green); color: white; font-weight: bold; }
    .cal-day.has-expiry { background: #fff3e0; border: 1.5px solid var(--orange); cursor: pointer; }
    .cal-day.has-urgent { background: #ffeaea; border: 1.5px solid var(--red); }
    .cal-day .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--orange);
      position: absolute;
      bottom: 3px; left: 50%;
      transform: translateX(-50%);
    }
    .cal-day.empty { background: transparent; }

    #calendar-event-list { margin-top: 14px; }

    /* ===== 提醒 ===== */
    .alert-item {
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: 0.92rem;
    }
    .alert-item.today { background: #ffeaea; border-left: 5px solid var(--red); }
    .alert-item.month { background: #fff8e1; border-left: 5px solid var(--yellow); }
    .alert-item .alert-title { font-weight: bold; margin-bottom: 2px; }
    .alert-item .alert-date { font-size: 0.8rem; color: #888; }

    /* ===== 打折專區 ===== */
    .discount-badge {
      display: inline-block;
      background: var(--orange);
      color: white;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
    }

    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: white;
      padding: 11px 24px;
      border-radius: 30px;
      font-size: 0.93rem;
      z-index: 9999;
      transition: transform 0.35s ease;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .empty-hint {
      text-align: center;
      color: #bbb;
      font-size: 0.93rem;
      padding: 30px 0;
    }
  </style>
</head>
<body>

<header>7-11 <span>即期品</span> 追蹤系統</header>

<nav>
  <button class="active" onclick="switchTab('tab-scan')">掃描/登錄</button>
  <button onclick="switchTab('tab-list')">商品列表</button>
  <button onclick="switchTab('tab-calendar')">行事曆</button>
  <button onclick="switchTab('tab-alerts')">即期提醒</button>
  <button onclick="switchTab('tab-discount')">打折專區</button>
</nav>

<!-- 掃描/登錄 -->
<div id="tab-scan" class="tab active">
  <div class="card">
    <h3>掃描條碼</h3>

    <!-- 相機權限提示區 -->
    <div id="camera-permission-box">
      <p>點擊下方按鈕以開啟相機進行條碼掃描。<br>首次使用時，瀏覽器會詢問是否允許相機權限，<strong>請選擇「允許」</strong>。</p>
      <button class="btn btn-orange" onclick="requestCameraPermission()">開啟相機掃描</button>
    </div>

    <!-- 相機視窗 -->
    <div id="camera-section">
      <div id="video-wrapper">
        <video id="scanner-video" autoplay muted playsinline></video>
        <div class="scan-overlay"><div class="scan-line"></div></div>
      </div>
      <div id="scan-status">請將條碼對準框框...</div>
      <button class="btn btn-gray" onclick="stopCamera()">關閉相機</button>
    </div>
  </div>

  <div class="card">
    <h3>手動登錄商品</h3>
    <input type="text" id="input-name" placeholder="商品名稱（必填）" />
    <input type="text" id="input-barcode" placeholder="條碼（選填）" />
    <input type="date" id="input-date" />
    <input type="number" id="input-price" placeholder="原價（選填）" min="0" />
    <input type="number" id="input-discount" placeholder="打折後價格（選填）" min="0" />
    <button class="btn btn-green" onclick="addProduct()">新增商品</button>
  </div>
</div>

<!-- 商品列表 -->
<div id="tab-list" class="tab">
  <div id="product-list"></div>
</div>

<!-- 行事曆 -->
<div id="tab-calendar" class="tab">
  <div class="card">
    <div class="calendar-header">
      <button onclick="changeMonth(-1)">&lt;</button>
      <span id="calendar-title"></span>
      <button onclick="changeMonth(1)">&gt;</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
  <div id="calendar-event-list"></div>
</div>

<!-- 即期提醒 -->
<div id="tab-alerts" class="tab">
  <div id="alert-list"></div>
</div>

<!-- 打折專區 -->
<div id="tab-discount" class="tab">
  <div id="discount-list"></div>
</div>

<div id="toast"></div>

<script>
  // ==================== 資料管理 ====================
  let products = JSON.parse(localStorage.getItem('products') || '[]');
  let codeReader = null;
  let currentStream = null;

  function saveProducts() {
    localStorage.setItem('products', JSON.stringify(products));
  }

  function getDaysLeft(dateStr) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const exp = new Date(dateStr);
    exp.setHours(0,0,0,0);
    return Math.round((exp - today) / (1000*60*60*24));
  }

  // ==================== 相機權限 ====================
  function requestCameraPermission() {
    // 確認瀏覽器支援
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showToast('您的瀏覽器不支援相機功能');
      return;
    }

    // 顯示相機區塊
    document.getElementById('camera-section').classList.add('show');
    document.getElementById('camera-permission-box').style.display = 'none';

    // 請求相機權限 (後置相機優先)
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' }, // 後置相機
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    };

    navigator.mediaDevices.getUserMedia(constraints)
      .then(function(stream) {
        currentStream = stream;
        const video = document.getElementById('scanner-video');
        const videoWrapper = document.getElementById('video-wrapper');
        video.srcObject = stream;
        videoWrapper.classList.add('show');
        startBarcodeScanning(video);
      })
      .catch(function(err) {
        console.error('相機錯誤:', err);
        const statusEl = document.getElementById('scan-status');
        statusEl.classList.add('error');

        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          statusEl.textContent = '相機權限被拒絕！請至手機設定中允許相機權限後再試。';
          showToast('請允許相機權限以使用掃描功能');
        } else if (err.name === 'NotFoundError') {
          statusEl.textContent = '找不到相機裝置，請確認相機是否正常。';
        } else {
          statusEl.textContent = '無法開啟相機：' + err.message;
        }

        // 恢復按鈕
        document.getElementById('camera-permission-box').style.display = 'block';
        document.getElementById('camera-section').classList.remove('show');
      });
  }

  function stopCamera() {
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
      currentStream = null;
    }
    if (codeReader) {
      codeReader.reset();
      codeReader = null;
    }
    document.getElementById('video-wrapper').classList.remove('show');
    document.getElementById('camera-section').classList.remove('show');
    document.getElementById('camera-permission-box').style.display = 'block';
    document.getElementById('scan-status').textContent = '請將條碼對準框框...';
    document.getElementById('scan-status').classList.remove('error');
  }

  function startBarcodeScanning(video) {
    if (typeof ZXing === 'undefined') {
      document.getElementById('scan-status').textContent = '條碼庫載入中，請稍候...';
      setTimeout(() => startBarcodeScanning(video), 1000);
      return;
    }

    try {
      codeReader = new ZXing.BrowserMultiFormatReader();
      codeReader.decodeFromVideoElement(video, (result, err) => {
        if (result) {
          const barcode = result.getText();
          document.getElementById('input-barcode').value = barcode;
          document.getElementById('scan-status').textContent = '掃描成功：' + barcode;
          showToast('條碼已掃描：' + barcode);
          stopCamera();
          switchTab('tab-scan');
        }
        if (err && !(err instanceof ZXing.NotFoundException)) {
          console.warn('掃描錯誤:', err);
        }
      });
    } catch(e) {
      document.getElementById('scan-status').textContent = '掃描器初始化失敗，請手動輸入條碼。';
    }
  }

  // ==================== 商品管理 ====================
  function addProduct() {
    const name = document.getElementById('input-name').value.trim();
    const barcode = document.getElementById('input-barcode').value.trim();
    const date = document.getElementById('input-date').value;
    const price = document.getElementById('input-price').value;
    const discount = document.getElementById('input-discount').value;

    if (!name) { showToast('請輸入商品名稱'); return; }
    if (!date) { showToast('請選擇到期日'); return; }

    const product = {
      id: Date.now(),
      name, barcode, date,
      price: price ? parseFloat(price) : null,
      discount: discount ? parseFloat(discount) : null,
      isDiscount: !!(price && discount)
    };

    products.push(product);
    saveProducts();
    showToast('商品已新增！');

    document.getElementById('input-name').value = '';
    document.getElementById('input-barcode').value = '';
    document.getElementById('input-date').value = '';
    document.getElementById('input-price').value = '';
    document.getElementById('input-discount').value = '';

    renderAll();
  }

  function deleteProduct(id) {
    products = products.filter(p => p.id !== id);
    saveProducts();
    renderAll();
    showToast('商品已刪除');
  }

  function toggleDiscount(id) {
    const p = products.find(p => p.id === id);
    if (p) {
      p.isDiscount = !p.isDiscount;
      saveProducts();
      renderAll();
    }
  }

  // ==================== 渲染 ====================
  function renderProductList() {
    const el = document.getElementById('product-list');
    if (products.length === 0) {
      el.innerHTML = '<div class="empty-hint">尚無商品，請先新增</div>';
      return;
    }

    const sorted = [...products].sort((a,b) => new Date(a.date) - new Date(b.date));
    el.innerHTML = sorted.map(p => {
      const days = getDaysLeft(p.date);
      let cls = '';
      let dayText = '';
      if (days < 0) { cls = 'urgent'; dayText = `<span class="days-left urgent">已過期 ${Math.abs(days)} 天</span>`; }
      else if (days === 0) { cls = 'urgent'; dayText = `<span class="days-left urgent">今天到期！</span>`; }
      else if (days <= 7) { cls = 'urgent'; dayText = `<span class="days-left urgent">剩 ${days} 天</span>`; }
      else if (days <= 30) { cls = 'warning'; dayText = `<span class="days-left warn">剩 ${days} 天</span>`; }
      else { dayText = `<span class="days-left ok">剩 ${days} 天</span>`; }

      if (p.isDiscount) cls = 'discount';

      const discountBadge = p.isDiscount ? '<span class="discount-badge">打折</span>' : '';

      return `
        <div class="product-item ${cls}">
          <div class="product-info">
            <div class="name">${p.name}${discountBadge}</div>
            ${p.barcode ? `<div class="barcode">條碼：${p.barcode}</div>` : ''}
            <div class="date">到期日：${p.date}</div>
            ${dayText}
            ${p.price ? `<div class="date">原價：${p.price} / 折扣：${p.discount || '-'}</div>` : ''}
          </div>
          <div class="product-actions">
            <button class="discount-btn" onclick="toggleDiscount(${p.id})">打折</button>
            <button class="del-btn" onclick="deleteProduct(${p.id})">刪除</button>
          </div>
        </div>`;
    }).join('');
  }

  // ==================== 行事曆 ====================
  let calYear, calMonth;
  function initCalendar() {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
    renderCalendar();
  }

  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  }

  function renderCalendar() {
    const title = document.getElementById('calendar-title');
    title.textContent = `${calYear} 年 ${calMonth + 1} 月`;

    const grid = document.getElementById('calendar-grid');
    const labels = ['日','一','二','三','四','五','六'];
    let html = labels.map(l => `<div class="cal-day-label">${l}</div>`).join('');

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const today = new Date();

    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
      const expiring = products.filter(p => p.date === dateStr);
      const hasUrgent = expiring.some(p => getDaysLeft(p.date) <= 7);
      let cls = isToday ? 'today' : '';
      if (expiring.length > 0 && !isToday) cls = hasUrgent ? 'has-urgent' : 'has-expiry';
      const dot = expiring.length > 0 ? '<div class="dot"></div>' : '';
      html += `<div class="cal-day ${cls}" onclick="showCalendarDay('${dateStr}')">${d}${dot}</div>`;
    }

    grid.innerHTML = html;
    renderCalendarEvents();
  }

  function showCalendarDay(dateStr) {
    const items = products.filter(p => p.date === dateStr);
    const el = document.getElementById('calendar-event-list');
    if (items.length === 0) { el.innerHTML = ''; return; }
    el.innerHTML = `<div class="card"><h3>${dateStr} 到期商品</h3>` +
      items.map(p => `<div style="padding:6px 0;border-bottom:1px solid #eee;">${p.name}</div>`).join('') +
      '</div>';
  }

  function renderCalendarEvents() {
    document.getElementById('calendar-event-list').innerHTML = '';
  }

  // ==================== 提醒 ====================
  function renderAlerts() {
    const el = document.getElementById('alert-list');
    const today = new Date(); today.setHours(0,0,0,0);

    const todayItems = products.filter(p => getDaysLeft(p.date) === 0);
    const monthItems = products.filter(p => { const d = getDaysLeft(p.date); return d > 0 && d <= 30; });

    let html = '';
    if (todayItems.length === 0 && monthItems.length === 0) {
      html = '<div class="empty-hint">目前無即期提醒</div>';
    }
    todayItems.forEach(p => {
      html += `<div class="alert-item today"><div class="alert-title">今天到期！${p.name}</div><div class="alert-date">到期日：${p.date}</div></div>`;
    });
    monthItems.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(p => {
      const d = getDaysLeft(p.date);
      html += `<div class="alert-item month"><div class="alert-title">${p.name}</div><div class="alert-date">到期日：${p.date}（剩 ${d} 天）</div></div>`;
    });

    el.innerHTML = html;
  }

  // ==================== 打折專區 ====================
  function renderDiscount() {
    const el = document.getElementById('discount-list');
    const items = products.filter(p => p.isDiscount);
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-hint">目前無打折商品</div>'; return;
    }
    el.innerHTML = items.map(p => `
      <div class="product-item discount">
        <div class="product-info">
          <div class="name">${p.name} <span class="discount-badge">打折</span></div>
          <div class="date">到期日：${p.date}（剩 ${getDaysLeft(p.date)} 天）</div>
          ${p.price ? `<div class="date">原價：${p.price} / 折扣價：${p.discount || '-'}</div>` : ''}
        </div>
        <div class="product-actions">
          <button class="del-btn" onclick="toggleDiscount(${p.id})">取消折扣</button>
        </div>
      </div>`).join('');
  }

  function renderAll() {
    renderProductList();
    renderCalendar();
    renderAlerts();
    renderDiscount();
  }

  // ==================== Tab 切換 ====================
  function switchTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    const idx = ['tab-scan','tab-list','tab-calendar','tab-alerts','tab-discount'].indexOf(id);
    document.querySelectorAll('nav button')[idx].classList.add('active');
  }

  // ==================== Toast ====================
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ==================== 初始化 ====================
  initCalendar();
  renderAll();
</script>
</body>
</html>
