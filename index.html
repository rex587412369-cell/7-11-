<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7-11 即期品管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html5-qrcode: 最穩定的行動裝置條碼掃描庫，內建 ZXing -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; padding-bottom: 70px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 掃描器外殼 */
        #reader {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        /* 強制隱藏 html5-qrcode 自帶的醜陋 UI 元件 */
        #reader__scan_region { position: relative; }
        #reader__dashboard { display: none !important; }
        #reader__status_span { display: none !important; }
        #reader img { display: none !important; }
        #reader select { display: none !important; }

        /* 自訂掃描動畫 */
        .scanner-wrapper { position: relative; display: none; margin-bottom: 1rem; }
        .laser {
            position: absolute; width: 80%; left: 10%; height: 2px;
            background: #22c55e; box-shadow: 0 0 10px #22c55e;
            top: 50%; z-index: 10;
            animation: scan 2s infinite linear;
            pointer-events: none;
        }
        @keyframes scan { 0% { top: 20%; } 50% { top: 80%; } 100% { top: 20%; } }
        .scan-corners {
            position: absolute; inset: 0; pointer-events: none; z-index: 9;
            border: 2px solid transparent;
            background:
                linear-gradient(to right, #22c55e 4px, transparent 4px) top left / 30px 30px no-repeat,
                linear-gradient(to bottom, #22c55e 4px, transparent 4px) top left / 30px 30px no-repeat,
                linear-gradient(to left, #22c55e 4px, transparent 4px) top right / 30px 30px no-repeat,
                linear-gradient(to bottom, #22c55e 4px, transparent 4px) top right / 30px 30px no-repeat,
                linear-gradient(to right, #22c55e 4px, transparent 4px) bottom left / 30px 30px no-repeat,
                linear-gradient(to top, #22c55e 4px, transparent 4px) bottom left / 30px 30px no-repeat,
                linear-gradient(to left, #22c55e 4px, transparent 4px) bottom right / 30px 30px no-repeat,
                linear-gradient(to top, #22c55e 4px, transparent 4px) bottom right / 30px 30px no-repeat;
        }

        /* 行事曆 */
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 2px auto; width: 32px; font-weight: 500; cursor: pointer; }
        .has-30days { background: #fb923c; color: white; }
        .has-7days { background: #ef4444; color: white; }
        .is-discount { border: 2px solid #ec4899; }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-green-600 text-white p-4 shadow-md sticky top-0 z-20 flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-store mr-2"></i>即期品管理系統</h1>
        <span id="engine-status" class="text-xs bg-green-800 px-2 py-1 rounded">初始化中...</span>
    </header>

    <main class="p-4">

        <!-- ====== 掃描登錄 ====== -->
        <section id="tab-scan" class="tab-content active">
            <h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fa-solid fa-barcode mr-2"></i>掃描登錄商品</h2>

            <button id="btn-open-scanner" onclick="startScanner()" class="w-full bg-blue-600 text-white py-3 rounded-lg shadow font-bold mb-4 active:bg-blue-700">
                <i class="fa-solid fa-camera mr-2"></i>開啟相機掃描條碼
            </button>

            <!-- 掃描器 -->
            <div class="scanner-wrapper" id="scanner-wrapper">
                <div id="reader"></div>
                <div class="laser"></div>
                <div class="scan-corners"></div>
                <button onclick="stopScanner()" class="absolute top-2 right-2 bg-red-600 text-white p-2 rounded-full shadow z-20">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- 比對進度條 -->
            <div id="verify-bar" class="hidden mb-3 bg-white p-3 rounded-lg shadow text-center">
                <div class="text-sm font-bold text-gray-600 mb-1" id="verify-text">等待掃描...</div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div id="verify-progress" class="bg-green-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div class="text-xs text-gray-400 mt-1" id="verify-code-preview"></div>
            </div>

            <!-- 表單 -->
            <div class="bg-white p-4 rounded-lg shadow">
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">商品條碼</label>
                    <input type="text" inputmode="numeric" id="input-barcode" class="w-full border p-2 rounded" placeholder="掃描或手動輸入">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">商品名稱</label>
                    <input type="text" id="input-name" class="w-full border p-2 rounded" placeholder="例如：統一布丁">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">到期日期</label>
                    <input type="date" id="input-date" class="w-full border p-2 rounded">
                </div>
                <button onclick="saveItem()" class="w-full bg-green-500 text-white py-2 rounded-lg font-bold shadow hover:bg-green-600">
                    <i class="fa-solid fa-plus mr-2"></i>加入庫存
                </button>
            </div>
        </section>

        <!-- ====== 庫存 ====== -->
        <section id="tab-inventory" class="tab-content">
            <h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fa-solid fa-box-open mr-2"></i>庫存與打折區</h2>
            <h3 class="font-bold text-pink-600 mb-2"><i class="fa-solid fa-tags mr-1"></i>打折專區 (30天內到期)</h3>
            <div id="discount-list" class="space-y-3 mb-6"></div>
            <h3 class="font-bold text-gray-600 mb-2"><i class="fa-solid fa-warehouse mr-1"></i>一般庫存 (安全期)</h3>
            <div id="inventory-list" class="space-y-3"></div>
        </section>

        <!-- ====== 行事曆 ====== -->
        <section id="tab-calendar" class="tab-content">
            <h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fa-regular fa-calendar-days mr-2"></i>即期品行事曆</h2>
            <div class="bg-white p-4 rounded-lg shadow mb-4">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="p-2"><i class="fa-solid fa-chevron-left"></i></button>
                    <h3 id="cal-month-year" class="font-bold text-lg"></h3>
                    <button onclick="changeMonth(1)" class="p-2"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-500 mb-2">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center text-sm"></div>
                <div class="mt-4 flex justify-around text-xs text-gray-600">
                    <span class="flex items-center"><div class="w-3 h-3 rounded-full bg-orange-400 mr-1"></div>30天內</span>
                    <span class="flex items-center"><div class="w-3 h-3 rounded-full bg-red-500 mr-1"></div>7天內</span>
                    <span class="flex items-center"><div class="w-3 h-3 border-2 border-pink-500 rounded-full mr-1"></div>打折區</span>
                </div>
            </div>
            <div id="cal-detail-box" class="bg-blue-50 p-4 rounded-lg shadow hidden">
                <h4 id="cal-detail-date" class="font-bold text-blue-800 border-b border-blue-200 pb-1 mb-2"></h4>
                <div id="cal-detail-items" class="space-y-2"></div>
            </div>
        </section>

        <!-- ====== 提醒 ====== -->
        <section id="tab-reminders" class="tab-content">
            <h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fa-solid fa-bell mr-2"></i>系統提醒</h2>
            <div id="reminders-container" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around text-xs text-gray-500 pb-safe z-30">
        <button onclick="switchTab('scan', this)" class="nav-btn flex-1 py-3 text-green-600 font-bold flex flex-col items-center">
            <i class="fa-solid fa-barcode text-xl mb-1"></i>掃描
        </button>
        <button onclick="switchTab('inventory', this)" class="nav-btn flex-1 py-3 flex flex-col items-center">
            <i class="fa-solid fa-box-open text-xl mb-1"></i>庫存
        </button>
        <button onclick="switchTab('calendar', this)" class="nav-btn flex-1 py-3 flex flex-col items-center">
            <i class="fa-regular fa-calendar-days text-xl mb-1"></i>行事曆
        </button>
        <button onclick="switchTab('reminders', this)" class="nav-btn flex-1 py-3 flex flex-col items-center relative">
            <i class="fa-solid fa-bell text-xl mb-1"></i>提醒
            <span id="reminder-badge" class="absolute top-1 right-3 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full hidden items-center justify-center">0</span>
        </button>
    </nav>

<script>
/* ===================== 資料 ===================== */
const productDB = {
    "4710088410043": "統一布丁(大)",
    "4710088631165": "麥香紅茶 300ml",
    "4710088430034": "茶裏王 日式無糖綠茶",
    "4710122060135": "瑞穗鮮乳 930ml",
    "4710088431802": "純喫茶 綠茶 650ml",
    "4710122060616": "統一無糖高纖豆漿"
};

let inventory = JSON.parse(localStorage.getItem('seven_inventory')) || [];
let html5QrCode = null;
let scanBuffer = {};      // { code: count } 累計每個候選條碼的出現次數
const REQUIRED_HITS = 4;  // 同一個通過 Checksum 的條碼，必須累積 4 次才輸出

window.onload = () => {
    document.getElementById('input-date').valueAsDate = new Date();
    renderInventory();
    renderReminders();
    renderCalendar();
    detectEngine();
};

/* ===================== 引擎偵測 ===================== */
function detectEngine() {
    const statusEl = document.getElementById('engine-status');
    if (typeof Html5Qrcode !== 'undefined') {
        statusEl.innerText = 'html5-qrcode 就緒';
    } else {
        statusEl.innerText = '函式庫載入中...';
        // 若未載入完成，等待 2 秒再檢查
        setTimeout(() => {
            statusEl.innerText = typeof Html5Qrcode !== 'undefined' ? 'html5-qrcode 就緒' : '請重新整理頁面';
        }, 2000);
    }
}

/* ===================== EAN Checksum 驗證 ===================== */
function isValidEAN(code) {
    if (!code || !/^\d+$/.test(code)) return false;
    const len = code.length;
    if (len !== 13 && len !== 8) return false;

    let sum = 0;
    if (len === 13) {
        for (let i = 0; i < 12; i++) sum += parseInt(code[i]) * (i % 2 === 0 ? 1 : 3);
        return (10 - (sum % 10)) % 10 === parseInt(code[12]);
    }
    if (len === 8) {
        for (let i = 0; i < 7; i++) sum += parseInt(code[i]) * (i % 2 === 0 ? 3 : 1);
        return (10 - (sum % 10)) % 10 === parseInt(code[7]);
    }
    return false;
}

/* ===================== 掃描器 ===================== */
async function startScanner() {
    if (typeof Html5Qrcode === 'undefined') {
        alert('掃描函式庫尚未載入完成，請稍後再試或重新整理頁面。');
        return;
    }

    document.getElementById('scanner-wrapper').style.display = 'block';
    document.getElementById('verify-bar').classList.remove('hidden');
    document.getElementById('btn-open-scanner').style.display = 'none';
    scanBuffer = {};
    updateVerifyUI(null, 0);

    try {
        html5QrCode = new Html5Qrcode("reader");

        // 取得所有可用攝影機，優先選後鏡頭
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
            alert('找不到相機裝置，請確認相機權限已開啟。');
            stopScanner();
            return;
        }

        // 找後鏡頭 (environment)
        let cameraId = cameras[0].id;
        for (const cam of cameras) {
            const label = (cam.label || '').toLowerCase();
            if (label.includes('back') || label.includes('rear') || label.includes('environment') || label.includes('後')) {
                cameraId = cam.id;
                break;
            }
        }

        const config = {
            fps: 15,
            qrbox: { width: 280, height: 160 },
            aspectRatio: 1.5,
            formatsToSupport: [
                Html5QrcodeSupportedFormats.EAN_13,
                Html5QrcodeSupportedFormats.EAN_8,
                Html5QrcodeSupportedFormats.UPC_A,
                Html5QrcodeSupportedFormats.UPC_E
            ],
            // 提升辨識率的進階設定
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true
            }
        };

        await html5QrCode.start(
            cameraId,
            config,
            onScanSuccess,
            onScanFailure
        );

        document.getElementById('engine-status').innerText = '相機掃描中';

    } catch (err) {
        console.error('掃描器啟動失敗:', err);
        alert('相機啟動失敗: ' + (err.message || err) + '\n請確認瀏覽器已允許相機存取權限。');
        stopScanner();
    }
}

/* 每次掃描成功的 callback（html5-qrcode 自動呼叫） */
function onScanSuccess(decodedText, decodedResult) {
    const code = (decodedText || '').trim();

    // 第一重：EAN Checksum 驗證
    if (!isValidEAN(code)) {
        updateVerifyUI('無效條碼 (校驗失敗，忽略)', 0);
        return;
    }

    // 第二重：累積計數（同一個正確條碼必須出現 REQUIRED_HITS 次）
    if (!scanBuffer[code]) scanBuffer[code] = 0;
    scanBuffer[code]++;

    const hits = scanBuffer[code];
    const pct = Math.min((hits / REQUIRED_HITS) * 100, 100);
    updateVerifyUI(`雙重比對中：${code}  (${hits}/${REQUIRED_HITS})`, pct);

    if (hits >= REQUIRED_HITS) {
        // 通過！輸出結果
        handleSuccess(code);
    }
}

/* 掃描失敗（每幀未找到條碼）：靜默即可，不需要提示 */
function onScanFailure(error) {
    // 刻意不做任何事，避免洗版錯誤訊息
}

function updateVerifyUI(msg, pct) {
    const textEl = document.getElementById('verify-text');
    const barEl = document.getElementById('verify-progress');
    const previewEl = document.getElementById('verify-code-preview');

    if (msg) textEl.innerText = msg;
    barEl.style.width = pct + '%';
    if (pct === 0) previewEl.innerText = '';
    else previewEl.innerText = '驗證進度 ' + Math.round(pct) + '%';

    // 顏色隨進度變化
    barEl.className = 'h-3 rounded-full transition-all duration-300 ' +
        (pct < 50 ? 'bg-orange-400' : pct < 100 ? 'bg-yellow-400' : 'bg-green-500');
}

function handleSuccess(code) {
    if (navigator.vibrate) navigator.vibrate([100, 50, 200]);

    document.getElementById('input-barcode').value = code;
    document.getElementById('input-name').value = productDB[code] || '';

    updateVerifyUI('掃描成功！', 100);
    setTimeout(stopScanner, 600);
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            html5QrCode.clear();
            html5QrCode = null;
        }).catch(() => { html5QrCode = null; });
    }
    document.getElementById('scanner-wrapper').style.display = 'none';
    document.getElementById('verify-bar').classList.add('hidden');
    document.getElementById('btn-open-scanner').style.display = 'block';
    document.getElementById('engine-status').innerText = 'html5-qrcode 就緒';
    scanBuffer = {};
}

/* ===================== 頁籤切換 ===================== */
function switchTab(tabId, btnEl) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('text-green-600', 'font-bold'));
    btnEl.classList.add('text-green-600', 'font-bold');
    if (tabId === 'calendar') renderCalendar();
    if (tabId === 'inventory') renderInventory();
    if (tabId === 'reminders') renderReminders();
}

/* ===================== 資料操作 ===================== */
function saveItem() {
    const barcode = document.getElementById('input-barcode').value.trim();
    const name = document.getElementById('input-name').value.trim();
    const dateStr = document.getElementById('input-date').value;
    if (!barcode || !name || !dateStr) { alert('請填寫完整資訊'); return; }

    inventory.push({ id: Date.now().toString(), barcode, name, expiryDate: dateStr });
    saveData();
    document.getElementById('input-barcode').value = '';
    document.getElementById('input-name').value = '';
    alert('成功加入庫存！');
    renderInventory(); renderReminders(); renderCalendar();
}

function saveData() {
    inventory.sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate));
    localStorage.setItem('seven_inventory', JSON.stringify(inventory));
}

function deleteItem(id) {
    if (!confirm('確定要刪除此商品嗎？')) return;
    inventory = inventory.filter(item => item.id !== id);
    saveData(); renderInventory(); renderReminders(); renderCalendar();
}

function getDaysDiff(dateStr) {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    return Math.ceil((new Date(dateStr) - today) / 86400000);
}

/* ===================== 庫存渲染 ===================== */
function renderInventory() {
    const dEl = document.getElementById('discount-list');
    const iEl = document.getElementById('inventory-list');
    dEl.innerHTML = ''; iEl.innerHTML = '';

    if (!inventory.length) { iEl.innerHTML = '<p class="text-gray-400 text-sm">目前無庫存</p>'; return; }

    inventory.forEach(item => {
        const days = getDaysDiff(item.expiryDate);
        const isDiscount = days <= 30;
        const tag = days < 0
            ? '<span class="text-xs bg-gray-500 text-white px-2 py-1 rounded">已過期</span>'
            : days === 0
                ? '<span class="text-xs bg-red-600 text-white px-2 py-1 rounded animate-pulse">今日到期</span>'
                : days <= 7
                    ? `<span class="text-xs bg-red-500 text-white px-2 py-1 rounded">剩 ${days} 天</span>`
                    : days <= 30
                        ? `<span class="text-xs bg-orange-400 text-white px-2 py-1 rounded">剩 ${days} 天</span>`
                        : `<span class="text-xs bg-green-500 text-white px-2 py-1 rounded">剩 ${days} 天</span>`;

        const html = `
            <div class="bg-white p-3 rounded-lg shadow-sm border-l-4 ${isDiscount ? 'border-pink-500' : 'border-green-500'} flex justify-between items-center">
                <div>
                    <div class="font-bold text-gray-800">${item.name}</div>
                    <div class="text-xs text-gray-500">條碼: ${item.barcode} | 到期: ${item.expiryDate}</div>
                </div>
                <div class="flex items-center gap-2">${tag}
                    <button onclick="deleteItem('${item.id}')" class="text-gray-400 hover:text-red-500 ml-2"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>`;
        if (isDiscount) dEl.insertAdjacentHTML('beforeend', html);
        else iEl.insertAdjacentHTML('beforeend', html);
    });
    if (!dEl.innerHTML) dEl.innerHTML = '<p class="text-gray-400 text-sm">目前無打折商品</p>';
}

/* ===================== 提醒渲染 ===================== */
function renderReminders() {
    const container = document.getElementById('reminders-container');
    const badge = document.getElementById('reminder-badge');
    container.innerHTML = '';
    let urgent = 0;

    inventory.forEach(item => {
        const days = getDaysDiff(item.expiryDate);
        if (days > 30) return;
        let icon = 'fa-bell', color = 'text-orange-500', msg = `已置入打折專區 (距到期 ${days} 天)`;
        if (days < 0) { icon = 'fa-circle-xmark'; color = 'text-gray-500'; msg = '已過期，請儘速報廢處理。'; }
        else if (days === 0) { icon = 'fa-triangle-exclamation'; color = 'text-red-600'; msg = '【緊急】商品今日到期！'; urgent++; }
        else if (days <= 7) { icon = 'fa-clock'; color = 'text-red-500'; msg = `即將到期，剩餘 ${days} 天！`; urgent++; }

        container.insertAdjacentHTML('beforeend', `
            <div class="bg-white p-3 rounded-lg shadow-sm flex items-start gap-3">
                <i class="fa-solid ${icon} ${color} mt-1"></i>
                <div>
                    <div class="font-bold text-gray-800">${item.name}</div>
                    <div class="text-xs ${color}">${msg}</div>
                    <div class="text-xs text-gray-400">到期日：${item.expiryDate}</div>
                </div>
            </div>`);
    });
    if (!container.innerHTML) container.innerHTML = '<p class="text-gray-400 text-sm text-center mt-6">目前沒有提醒事項</p>';
    badge.style.display = urgent > 0 ? 'flex' : 'none';
    badge.innerText = urgent;
}

/* ===================== 行事曆 ===================== */
let currentDate = new Date();
function changeMonth(d) { currentDate.setMonth(currentDate.getMonth() + d); renderCalendar(); }

function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    const label = document.getElementById('cal-month-year');
    grid.innerHTML = '';
    document.getElementById('cal-detail-box').classList.add('hidden');

    const y = currentDate.getFullYear(), m = currentDate.getMonth();
    label.innerText = `${y}年 ${m + 1}月`;

    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const dateMap = {};

    inventory.forEach(item => {
        const days = getDaysDiff(item.expiryDate);
        if (days > 30) return;
        if (!dateMap[item.expiryDate]) dateMap[item.expiryDate] = { minDays: 999 };
        if (days < dateMap[item.expiryDate].minDays) dateMap[item.expiryDate].minDays = days;
    });

    for (let i = 0; i < firstDay; i++) grid.insertAdjacentHTML('beforeend', '<div class="cal-day"></div>');
    for (let i = 1; i <= daysInMonth; i++) {
        const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        let cls = 'cal-day bg-white hover:bg-gray-100 shadow-sm';
        if (dateMap[ds]) {
            cls += ' is-discount';
            cls += dateMap[ds].minDays <= 7 ? ' has-7days text-white' : ' has-30days text-white';
        }
        grid.insertAdjacentHTML('beforeend', `<div class="${cls}" onclick="showDateDetails('${ds}')">${i}</div>`);
    }
}

function showDateDetails(dateStr) {
    const box = document.getElementById('cal-detail-box');
    const items = inventory.filter(i => i.expiryDate === dateStr);
    if (!items.length) { box.classList.add('hidden'); return; }
    document.getElementById('cal-detail-date').innerText = `${dateStr} 到期商品 (${items.length} 件)`;
    document.getElementById('cal-detail-items').innerHTML = items.map(item =>
        `<div class="flex justify-between bg-white p-2 rounded text-sm">
            <span class="font-bold">${item.name}</span>
            <span class="text-gray-500">${item.barcode}</span>
        </div>`
    ).join('');
    box.classList.remove('hidden');
    box.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
