<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>7-11 即期品管理</title>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  :root {
    --green:#007b40;--green2:#00a550;--orange:#f97316;
    --red:#ef4444;--yellow:#fbbf24;--bg:#f5f5f0;
    --card:#fff;--border:#e2e8f0;--text:#1a1a1a;--sub:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Helvetica Neue',Arial,sans-serif}
  body{background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  header h1{font-size:18px;font-weight:700}
  header span{font-size:12px;background:var(--green2);padding:2px 8px;border-radius:99px}
  .tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:49px;z-index:99}
  .tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;border:none;background:none;transition:.2s}
  .tab.active{color:var(--green);border-bottom:3px solid var(--green)}
  .page{display:none;padding:12px}
  .page.active{display:block}

  /* === SCAN PAGE === */
  .scan-area{background:#000;border-radius:12px;overflow:hidden;position:relative;aspect-ratio:4/3;max-height:52vw}
  #scanner-video{width:100%;height:100%;object-fit:cover;display:block}
  .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .scan-frame{width:65%;aspect-ratio:1;border:2px solid rgba(255,255,255,.8);border-radius:8px;position:relative}
  .scan-frame::before,.scan-frame::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--green2);border-style:solid}
  .scan-frame::before{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
  .scan-frame::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
  .scan-line{position:absolute;width:90%;height:2px;background:linear-gradient(90deg,transparent,var(--green2),transparent);animation:scanLine 2s linear infinite;top:10%}
  @keyframes scanLine{0%{top:10%}50%{top:85%}100%{top:10%}}
  #status-bar{margin-top:8px;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;background:#e0f2e9;color:var(--green)}
  #status-bar.error{background:#fee2e2;color:var(--red)}
  #status-bar.warning{background:#fef9c3;color:#b45309}
  .scan-btn{width:100%;margin-top:10px;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;background:var(--green);color:#fff;transition:.15s}
  .scan-btn:active{transform:scale(.97)}
  .scan-btn.stop{background:#ef4444}
  canvas{display:none}
  .form-section{margin-top:12px;background:var(--card);border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .form-section h3{font-size:14px;font-weight:700;color:var(--green);margin-bottom:10px}
  .form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .form-row label{font-size:12px;font-weight:600;color:var(--sub)}
  .form-row input,.form-row select{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:.2s}
  .form-row input:focus,.form-row select:focus{border-color:var(--green)}
  .save-btn{width:100%;padding:12px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}

  /* === INVENTORY === */
  .filter-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px}
  .filter-btn{padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--sub)}
  .filter-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
  .item-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--border);position:relative}
  .item-card.urgent{border-left-color:var(--red)}
  .item-card.soon{border-left-color:var(--orange)}
  .item-card.ok{border-left-color:var(--green2)}
  .item-card.discount{border-left-color:var(--yellow);background:#fffbeb}
  .item-top{display:flex;justify-content:space-between;align-items:flex-start}
  .item-name{font-size:14px;font-weight:700}
  .item-badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:700}
  .badge-red{background:#fee2e2;color:var(--red)}
  .badge-orange{background:#ffedd5;color:#c2410c}
  .badge-green{background:#d1fae5;color:#065f46}
  .badge-yellow{background:#fef9c3;color:#92400e}
  .item-meta{font-size:12px;color:var(--sub);margin-top:4px}
  .item-actions{display:flex;gap:6px;margin-top:8px}
  .btn-small{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;border:none;cursor:pointer}
  .btn-disc{background:#fef9c3;color:#92400e}
  .btn-del{background:#fee2e2;color:var(--red)}
  .btn-restore{background:#d1fae5;color:#065f46}
  .empty-state{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px}

  /* === CALENDAR === */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-nav{background:none;border:1.5px solid var(--border);border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--text)}
  .cal-title{font-size:16px;font-weight:700}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--sub);padding:4px 0}
  .cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:2px solid transparent;transition:.15s;position:relative}
  .cal-day:hover{background:#f0fdf4}
  .cal-day.today{background:#d1fae5;font-weight:700}
  .cal-day.has-urgent{background:#fee2e2;color:var(--red);font-weight:700}
  .cal-day.has-soon{background:#ffedd5;color:#c2410c;font-weight:700}
  .cal-day.has-discount{border-color:var(--yellow)}
  .cal-day.selected{outline:2px solid var(--green)}
  .cal-day .dot{width:5px;height:5px;border-radius:50%;background:var(--green);position:absolute;bottom:3px}
  .cal-detail{margin-top:12px;background:var(--card);border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .cal-detail h3{font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px}
  .upcoming-list{margin-top:12px}
  .upcoming-item{padding:10px 12px;background:var(--card);border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.07)}

  /* === ALERT === */
  .alert-section{margin-bottom:14px}
  .alert-section h3{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .alert-count{background:var(--red);color:#fff;font-size:11px;padding:1px 7px;border-radius:99px}
  .alert-count.orange{background:var(--orange)}
  .alert-count.yellow{background:var(--yellow);color:#92400e}
  .alert-item{padding:10px 12px;background:var(--card);border-radius:10px;margin-bottom:5px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .push-btn{width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:14px}

  /* === DISCOUNT === */
  .disc-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid var(--yellow);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .disc-price{font-size:18px;font-weight:800;color:var(--orange)}
  .disc-original{font-size:13px;color:var(--sub);text-decoration:line-through}
  .disc-badge{background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
  .section-title{font-size:15px;font-weight:800;color:var(--green);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--green)}
  #lib-status{font-size:11px;padding:4px 10px;border-radius:6px;margin-bottom:8px;display:inline-block;font-weight:600}
</style>
</head>
<body>
<header>
  <div>
    <h1>7-11 即期品管理</h1>
  </div>
  <span id="total-badge">0 件</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('scan')">掃描</button>
  <button class="tab" onclick="switchTab('inventory')">庫存</button>
  <button class="tab" onclick="switchTab('calendar')">行事曆</button>
  <button class="tab" onclick="switchTab('alerts')">提醒</button>
  <button class="tab" onclick="switchTab('discount')">打折</button>
</div>

<!-- SCAN PAGE -->
<div id="tab-scan" class="page active">
  <div id="lib-status" style="background:#fef9c3;color:#b45309">偵測掃描引擎中...</div>
  <div class="scan-area">
    <video id="scanner-video" playsinline muted autoplay style="width:100%;height:100%;object-fit:cover;display:block"></video>
    <canvas id="qr-canvas"></canvas>
    <div class="scan-overlay" id="scan-overlay">
      <div style="text-align:center;color:rgba(255,255,255,.7);font-size:14px">按下開始掃描</div>
    </div>
  </div>
  <div id="status-bar">準備就緒 — 按下開始掃描</div>
  <button class="scan-btn" id="scan-btn" onclick="toggleScan()">開始掃描</button>
  <div style="margin-top:8px;display:flex;gap:8px">
    <button class="scan-btn" style="background:#475569;font-size:13px;padding:10px" onclick="switchCamera()">切換鏡頭</button>
    <button class="scan-btn" style="background:#0ea5e9;font-size:13px;padding:10px" onclick="manualEntry()">手動輸入條碼</button>
  </div>

  <div class="form-section">
    <h3>商品資訊</h3>
    <div class="form-row">
      <label>商品名稱</label>
      <input id="f-name" type="text" placeholder="掃描後自動填入或手動輸入"/>
    </div>
    <div class="form-row">
      <label>條碼</label>
      <input id="f-barcode" type="text" placeholder="掃描後自動填入"/>
    </div>
    <div class="form-row">
      <label>分類</label>
      <select id="f-cat">
        <option value="飲料">飲料</option>
        <option value="食品">食品</option>
        <option value="麵包">麵包</option>
        <option value="乳品">乳品</option>
        <option value="零食">零食</option>
        <option value="日用品">日用品</option>
        <option value="冷凍品">冷凍品</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="form-row">
      <label>售價</label>
      <input id="f-price" type="number" placeholder="例如 35"/>
    </div>
    <div class="form-row">
      <label>到期日</label>
      <input id="f-exp" type="date"/>
    </div>
    <div class="form-row">
      <label>數量</label>
      <input id="f-qty" type="number" value="1" min="1"/>
    </div>
    <button class="save-btn" onclick="saveItem()">儲存商品</button>
  </div>
</div>

<!-- INVENTORY PAGE -->
<div id="tab-inventory" class="page">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" onclick="setFilter('urgent',this)">緊急</button>
    <button class="filter-btn" onclick="setFilter('soon',this)">即將到期</button>
    <button class="filter-btn" onclick="setFilter('ok',this)">正常</button>
    <button class="filter-btn" onclick="setFilter('discount',this)">打折中</button>
  </div>
  <div id="inventory-list"></div>
</div>

<!-- CALENDAR PAGE -->
<div id="tab-calendar" class="page">
  <div class="cal-header">
    <button class="cal-nav" onclick="calNav(-1)">&#8249;</button>
    <div class="cal-title" id="cal-title"></div>
    <button class="cal-nav" onclick="calNav(1)">&#8250;</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-detail" id="cal-detail" style="display:none"></div>
  <div class="upcoming-list">
    <div class="section-title">未來 30 天即期品</div>
    <div id="upcoming-list"></div>
  </div>
</div>

<!-- ALERTS PAGE -->
<div id="tab-alerts" class="page">
  <button class="push-btn" onclick="sendPushAlerts()">立即推送所有提醒通知</button>
  <div id="alerts-content"></div>
</div>

<!-- DISCOUNT PAGE -->
<div id="tab-discount" class="page">
  <div class="section-title">打折專區</div>
  <div id="discount-list"></div>
</div>

<script>
// ===================== DATA =====================
const PRODUCTS = {
  "4901085615706":["麥香紅茶",30,"飲料"],"4902102141543":["可口可樂330ml",25,"飲料"],
  "4902102141550":["百事可樂330ml",25,"飲料"],"4710253961168":["統一麥香綠茶",20,"飲料"],
  "4710088001506":["悅氏礦泉水",15,"飲料"],"4710038100012":["光泉鮮乳",55,"乳品"],
  "4710070010017":["福樂鮮乳",58,"乳品"],"4902430399920":["明治香蕉牛奶",35,"乳品"],
  "4710253861016":["統一陽光優酪乳",45,"乳品"],"4710253861023":["統一莓果優酪乳",45,"乳品"],
  "4901001208075":["卡樂比洋芋片",49,"零食"],"4901085000003":["Pocky巧克力棒",35,"零食"],
  "4902555143033":["Kitkat巧克力",39,"零食"],"4710088611145":["旺旺仙貝",29,"零食"],
  "4710253210012":["科學麵",15,"零食"],"4718009010011":["7-11 御飯糰鮭魚",39,"食品"],
  "4718009010028":["7-11 御飯糰鮪魚",39,"食品"],"4718009010035":["7-11 御飯糰昆布",35,"食品"],
  "4718009010042":["7-11 雞腿便當",85,"食品"],"4718009010059":["7-11 排骨便當",80,"食品"],
  "4718009020010":["7-11 熱狗",25,"食品"],"4718009020027":["7-11 關東煮蘿蔔",15,"食品"],
  "4710088100012":["7-11 鮮食三明治",45,"麵包"],"4710088100029":["7-11 總匯三明治",55,"麵包"],
  "4710088200011":["7-11 牛角麵包",35,"麵包"],"4710088200028":["7-11 菠蘿麵包",29,"麵包"],
  "4710088300010":["7-11 冷凍水餃",99,"冷凍品"],"4710088300027":["7-11 冷凍湯圓",79,"冷凍品"],
  "4901480089084":["花王洗碗精",79,"日用品"],"4901301380494":["雀巢即溶咖啡",149,"飲料"],
  "4710088500012":["7-11 黑咖啡",39,"飲料"],"4710088500029":["7-11 拿鐵咖啡",55,"飲料"],
  "4710038200013":["光泉果汁牛乳",25,"乳品"],"4902430383836":["格力高百奇",45,"零食"],
  "4901085601020":["統一肉燥麵",25,"食品"],"4710088400011":["義美小泡芙",39,"零食"],
  "4710088400028":["義美冰淇淋",45,"乳品"],"4718009030019":["7-11 茶葉蛋",10,"食品"],
  "4710253161019":["統一蜜豆奶",25,"飲料"],"4902102141567":["雪碧330ml",25,"飲料"],
  "0049000028904":["芬達橘子330ml",25,"飲料"]
};

let inventory = JSON.parse(localStorage.getItem('inv711')||'[]');
let inventoryFilter = 'all';
let calYear, calMonth, selectedCalDay;
let scanActive = false;
let currentStream = null;
let scanEngine = null; // 'barcodedetector' | 'quagga' | 'jsqr' | null
let animFrame = null;
let facingMode = 'environment';
let quaggaRunning = false;

// ===================== ENGINE DETECT =====================
function detectEngine() {
  const el = document.getElementById('lib-status');
  if (typeof BarcodeDetector !== 'undefined') {
    BarcodeDetector.getSupportedFormats().then(fmts => {
      const need = ['ean_13','qr_code'];
      const has = need.filter(f => fmts.includes(f));
      if (has.length > 0) {
        scanEngine = 'barcodedetector';
        el.style.background = '#d1fae5'; el.style.color = '#065f46';
        el.textContent = 'BarcodeDetector 就緒（最佳效能）';
      } else { tryQuagga(el); }
    }).catch(()=>tryQuagga(el));
  } else if (typeof Quagga !== 'undefined') {
    tryQuagga(el);
  } else if (typeof jsQR !== 'undefined') {
    scanEngine = 'jsqr';
    el.style.background = '#fef9c3'; el.style.color = '#b45309';
    el.textContent = 'jsQR 就緒（僅 QR Code）';
  } else {
    scanEngine = 'manual';
    el.style.background = '#fee2e2'; el.style.color = '#b91c1c';
    el.textContent = '無法載入掃描引擎 — 請使用手動輸入';
  }
}

function tryQuagga(el) {
  if (typeof Quagga !== 'undefined') {
    scanEngine = 'quagga';
    el.style.background = '#d1fae5'; el.style.color = '#065f46';
    el.textContent = 'Quagga 就緒（支援 EAN-13 條碼）';
  } else {
    scanEngine = 'jsqr';
    el.style.background = '#fef9c3'; el.style.color = '#b45309';
    el.textContent = 'jsQR 就緒（僅 QR Code）';
  }
}

// ===================== CAMERA =====================
async function startCamera() {
  const video = document.getElementById('scanner-video');
  const constraints = [
    { video:{ facingMode:{ exact: facingMode }, width:{ideal:1280}, height:{ideal:720} } },
    { video:{ facingMode: facingMode, width:{ideal:1280}, height:{ideal:720} } },
    { video:{ facingMode: 'environment' } },
    { video: true }
  ];
  for (const c of constraints) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia(c);
      currentStream = stream;
      video.srcObject = stream;
      await new Promise((res,rej)=>{
        video.onloadedmetadata = res;
        setTimeout(rej, 5000);
      });
      await video.play();
      return true;
    } catch(e) { /* try next */ }
  }
  return false;
}

function stopCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(t=>t.stop());
    currentStream = null;
  }
  const video = document.getElementById('scanner-video');
  video.srcObject = null;
  if (quaggaRunning) { try { Quagga.stop(); } catch(e){} quaggaRunning = false; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

// ===================== SCAN TOGGLE =====================
async function toggleScan() {
  if (scanActive) {
    stopScan();
  } else {
    await startScan();
  }
}

async function startScan() {
  setStatus('開啟相機中...', '');
  const ok = await startCamera();
  if (!ok) { setStatus('相機開啟失敗，請允許相機權限', 'error'); return; }
  scanActive = true;
  document.getElementById('scan-btn').textContent = '停止掃描';
  document.getElementById('scan-btn').classList.add('stop');
  document.getElementById('scan-overlay').innerHTML = '<div class="scan-frame"><div class="scan-line"></div></div>';

  if (scanEngine === 'barcodedetector') {
    setStatus('BarcodeDetector 掃描中...', '');
    startBarcodeDetector();
  } else if (scanEngine === 'quagga') {
    setStatus('Quagga 掃描中...', '');
    startQuaggaScan();
  } else {
    setStatus('jsQR 掃描中（僅 QR Code）...', '');
    startJsQRLoop();
  }
}

function stopScan() {
  stopCamera();
  scanActive = false;
  document.getElementById('scan-btn').textContent = '開始掃描';
  document.getElementById('scan-btn').classList.remove('stop');
  document.getElementById('scan-overlay').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.7);font-size:14px">按下開始掃描</div>';
  setStatus('掃描已停止', '');
}

// ===================== BARCODE DETECTOR =====================
function startBarcodeDetector() {
  const formats = ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code','itf'];
  const detector = new BarcodeDetector({ formats: formats.filter(f => true) });
  const video = document.getElementById('scanner-video');

  async function detect() {
    if (!scanActive) return;
    try {
      const results = await detector.detect(video);
      if (results && results.length > 0) {
        const code = results[0].rawValue;
        onBarcodeFound(code, `BarcodeDetector:${results[0].format}`);
        return;
      }
    } catch(e) {}
    animFrame = requestAnimationFrame(detect);
  }
  animFrame = requestAnimationFrame(detect);
}

// ===================== QUAGGA =====================
function startQuaggaScan() {
  const video = document.getElementById('scanner-video');
  const container = document.querySelector('.scan-area');

  Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target: video,
      constraints: { facingMode: facingMode },
      area: { top:'10%', right:'5%', bottom:'10%', left:'5%' }
    },
    decoder: {
      readers: [
        'ean_reader','ean_8_reader','upc_reader','upc_e_reader',
        'code_128_reader','code_39_reader','i2of5_reader'
      ],
      multiple: false
    },
    locate: true,
    numOfWorkers: 2,
    frequency: 15
  }, err => {
    if (err) {
      setStatus('Quagga 初始化失敗，切換 jsQR...', 'warning');
      scanEngine = 'jsqr';
      startJsQRLoop();
      return;
    }
    Quagga.start();
    quaggaRunning = true;
  });

  Quagga.offDetected();
  Quagga.onDetected(result => {
    if (!scanActive) return;
    const code = result.codeResult && result.codeResult.code;
    const fmt = result.codeResult && result.codeResult.format;
    if (code && code.length >= 8) {
      onBarcodeFound(code, `Quagga:${fmt}`);
    }
  });
}

// ===================== JSQR LOOP =====================
function startJsQRLoop() {
  const video = document.getElementById('scanner-video');
  const canvas = document.getElementById('qr-canvas');
  const ctx = canvas.getContext('2d');

  function loop() {
    if (!scanActive) return;
    if (video.readyState >= 2 && video.videoWidth > 0) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0,0,canvas.width,canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts:'dontInvert' });
      if (code && code.data) {
        onBarcodeFound(code.data, 'jsQR:QR_CODE');
        return;
      }
    }
    animFrame = requestAnimationFrame(loop);
  }
  animFrame = requestAnimationFrame(loop);
}

// ===================== BARCODE FOUND =====================
function onBarcodeFound(code, engine) {
  stopScan();
  setStatus(`掃描成功！條碼：${code}（${engine}）`, '');
  fillForm(code);

  // vibrate
  if (navigator.vibrate) navigator.vibrate([80,40,80]);
}

function fillForm(code) {
  document.getElementById('f-barcode').value = code;
  const info = PRODUCTS[code];
  if (info) {
    document.getElementById('f-name').value = info[0];
    document.getElementById('f-price').value = info[1];
    document.getElementById('f-cat').value = info[2];
    setStatus(`找到商品：${info[0]}`, '');
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-price').value = '';
    setStatus(`條碼 ${code} — 請手動輸入商品名稱`, 'warning');
  }
  // set today+7 as default expiry
  const d = new Date(); d.setDate(d.getDate()+7);
  document.getElementById('f-exp').value = d.toISOString().slice(0,10);
}

// ===================== SWITCH CAMERA =====================
async function switchCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if (scanActive) {
    stopCamera();
    quaggaRunning = false;
    const ok = await startCamera();
    if (!ok) { setStatus('切換鏡頭失敗','error'); return; }
    if (scanEngine === 'barcodedetector') startBarcodeDetector();
    else if (scanEngine === 'quagga') startQuaggaScan();
    else startJsQRLoop();
  }
}

// ===================== MANUAL ENTRY =====================
function manualEntry() {
  const code = prompt('請輸入條碼號碼：');
  if (code && code.trim()) {
    fillForm(code.trim());
  }
}

// ===================== STATUS =====================
function setStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = type ? `error-${type}` : '';
  el.style.background = type === 'error' ? '#fee2e2' : type === 'warning' ? '#fef9c3' : '#d1fae5';
  el.style.color = type === 'error' ? '#b91c1c' : type === 'warning' ? '#b45309' : '#065f46';
}

// ===================== SAVE =====================
function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  const exp = document.getElementById('f-exp').value;
  if (!name) { alert('請填寫商品名稱'); return; }
  if (!exp) { alert('請選擇到期日'); return; }

  const item = {
    id: Date.now(),
    name,
    barcode: document.getElementById('f-barcode').value,
    cat: document.getElementById('f-cat').value,
    price: parseFloat(document.getElementById('f-price').value)||0,
    qty: parseInt(document.getElementById('f-qty').value)||1,
    exp,
    discount: false,
    addedAt: new Date().toISOString()
  };

  // auto-discount if <=30 days
  const days = daysUntil(exp);
  if (days <= 30 && days >= 0) item.discount = true;

  inventory.push(item);
  saveData();
  alert(`「${name}」已儲存！`);
  ['f-name','f-barcode','f-price','f-exp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-qty').value = '1';
  updateBadge();
}

// ===================== UTILS =====================
function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d-today)/(1000*60*60*24));
}
function statusOf(item) {
  if (item.discount) return 'discount';
  const d = daysUntil(item.exp);
  if (d < 0) return 'expired';
  if (d <= 3) return 'urgent';
  if (d <= 7) return 'soon';
  return 'ok';
}
function badgeHtml(item) {
  const d = daysUntil(item.exp);
  if (item.discount) return `<span class="item-badge badge-yellow">打折中</span>`;
  if (d < 0) return `<span class="item-badge badge-red">已過期</span>`;
  if (d === 0) return `<span class="item-badge badge-red">今日到期</span>`;
  if (d <= 3) return `<span class="item-badge badge-red">剩 ${d} 天</span>`;
  if (d <= 7) return `<span class="item-badge badge-orange">剩 ${d} 天</span>`;
  return `<span class="item-badge badge-green">剩 ${d} 天</span>`;
}
function saveData() {
  localStorage.setItem('inv711', JSON.stringify(inventory));
  renderInventory(); renderAlerts(); renderDiscount(); renderCalendar(); updateBadge();
}
function updateBadge() {
  document.getElementById('total-badge').textContent = inventory.length + ' 件';
}

// ===================== INVENTORY =====================
function setFilter(f, btn) {
  inventoryFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderInventory();
}
function renderInventory() {
  const el = document.getElementById('inventory-list');
  let items = [...inventory];
  if (inventoryFilter !== 'all') items = items.filter(i=>statusOf(i)===inventoryFilter);
  items.sort((a,b)=>a.exp.localeCompare(b.exp));
  if (!items.length) { el.innerHTML='<div class="empty-state">目前沒有商品</div>'; return; }
  el.innerHTML = items.map(item=>{
    const st = statusOf(item);
    const d = daysUntil(item.exp);
    return `<div class="item-card ${st}">
      <div class="item-top">
        <div class="item-name">${item.name}</div>
        ${badgeHtml(item)}
      </div>
      <div class="item-meta">${item.cat} | 售價 $${item.price} | 數量 ${item.qty} | 到期：${item.exp}</div>
      ${item.barcode?`<div class="item-meta">條碼：${item.barcode}</div>`:''}
      <div class="item-actions">
        ${!item.discount?`<button class="btn-small btn-disc" onclick="toggleDiscount(${item.id})">移入打折</button>`:`<button class="btn-small btn-restore" onclick="toggleDiscount(${item.id})">取消打折</button>`}
        <button class="btn-small btn-del" onclick="deleteItem(${item.id})">刪除</button>
      </div>
    </div>`;
  }).join('');
}
function toggleDiscount(id) {
  const i = inventory.find(x=>x.id===id);
  if (i) { i.discount = !i.discount; saveData(); }
}
function deleteItem(id) {
  if (!confirm('確定刪除？')) return;
  inventory = inventory.filter(x=>x.id!==id);
  saveData();
}

// ===================== CALENDAR =====================
function initCal() {
  const n = new Date();
  calYear = n.getFullYear(); calMonth = n.getMonth();
  renderCalendar();
}
function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth=0; calYear++; }
  if (calMonth < 0) { calMonth=11; calYear--; }
  renderCalendar();
}
function renderCalendar() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent = `${calYear} 年 ${months[calMonth]}`;
  const grid = document.getElementById('cal-grid');
  const dows = ['日','一','二','三','四','五','六'];
  const today = new Date(); today.setHours(0,0,0,0);

  // map items by date
  const byDate = {};
  inventory.forEach(item=>{
    if (!byDate[item.exp]) byDate[item.exp]={urgent:0,soon:0,discount:0,items:[]};
    const d = daysUntil(item.exp);
    if (d<=3) byDate[item.exp].urgent++;
    else if (d<=7) byDate[item.exp].soon++;
    if (item.discount) byDate[item.exp].discount++;
    byDate[item.exp].items.push(item);
  });

  let html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first = new Date(calYear,calMonth,1).getDay();
  const days = new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<first;i++) html+=`<div class="cal-day" style="opacity:0"></div>`;
  for(let d=1;d<=days;d++){
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const info = byDate[ds];
    const isToday = ds === today.toISOString().slice(0,10);
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (info) {
      if (info.urgent>0) cls+=' has-urgent';
      else if (info.soon>0) cls+=' has-soon';
      if (info.discount>0) cls+=' has-discount';
    }
    if (selectedCalDay===ds) cls+=' selected';
    html+=`<div class="${cls}" onclick="selectCalDay('${ds}')">${d}${info?'<div class="dot"></div>':''}</div>`;
  }
  grid.innerHTML = html;

  // upcoming 30 days
  const up = inventory.filter(i=>{ const d=daysUntil(i.exp); return d>=0&&d<=30; })
    .sort((a,b)=>a.exp.localeCompare(b.exp));
  const upEl = document.getElementById('upcoming-list');
  upEl.innerHTML = up.length ? up.map(i=>`
    <div class="upcoming-item">
      <div>
        <div style="font-size:13px;font-weight:700">${i.name}</div>
        <div style="font-size:11px;color:var(--sub)">${i.exp} | $${i.price}</div>
      </div>
      ${badgeHtml(i)}
    </div>`).join('') : '<div class="empty-state">近 30 天無即期商品</div>';
}
function selectCalDay(ds) {
  selectedCalDay = ds;
  renderCalendar();
  const items = inventory.filter(i=>i.exp===ds);
  const det = document.getElementById('cal-detail');
  if (!items.length) { det.style.display='none'; return; }
  det.style.display='block';
  det.innerHTML = `<h3>${ds} 到期商品（${items.length} 件）</h3>`+items.map(i=>`
    <div class="upcoming-item">
      <div><div style="font-size:13px;font-weight:700">${i.name}</div>
      <div style="font-size:11px;color:var(--sub)">${i.cat} | 數量 ${i.qty}</div></div>
      ${badgeHtml(i)}
    </div>`).join('');
}

// ===================== ALERTS =====================
function renderAlerts() {
  const el = document.getElementById('alerts-content');
  const expired = inventory.filter(i=>daysUntil(i.exp)<0);
  const today   = inventory.filter(i=>daysUntil(i.exp)===0);
  const week    = inventory.filter(i=>{ const d=daysUntil(i.exp); return d>0&&d<=7; });
  const month   = inventory.filter(i=>{ const d=daysUntil(i.exp); return d>7&&d<=30; });

  function section(title,items,cls,countCls){
    if(!items.length) return '';
    return `<div class="alert-section">
      <h3>${title} <span class="alert-count ${countCls}">${items.length}</span></h3>
      ${items.sort((a,b)=>a.exp.localeCompare(b.exp)).map(i=>`
        <div class="alert-item">
          <div style="font-weight:700;font-size:13px">${i.name}</div>
          <div style="font-size:12px;color:var(--sub)">${i.exp} | $${i.price} x${i.qty}</div>
        </div>`).join('')}
    </div>`;
  }

  el.innerHTML =
    section('已過期', expired, 'urgent', '') +
    section('今日到期', today, 'urgent', '') +
    section('7 天內到期', week, 'soon', 'orange') +
    section('30 天內到期（建議打折）', month, 'ok', 'yellow') ||
    '<div class="empty-state">目前沒有即期提醒</div>';
}

function sendPushAlerts() {
  if (!('Notification' in window)) { alert('此瀏覽器不支援通知'); return; }
  Notification.requestPermission().then(perm=>{
    if (perm !== 'granted') { alert('未取得通知權限'); return; }
    const urgent = inventory.filter(i=>{ const d=daysUntil(i.exp); return d>=0&&d<=7; });
    if (!urgent.length) { new Notification('7-11 即期品', {body:'目前無緊急即期商品'}); return; }
    urgent.forEach(i=>{
      new Notification(`即期提醒：${i.name}`, {
        body:`到期日：${i.exp}（剩 ${daysUntil(i.exp)} 天）`,
        icon: ''
      });
    });
  });
}

// ===================== DISCOUNT =====================
function renderDiscount() {
  const el = document.getElementById('discount-list');
  const items = inventory.filter(i=>i.discount).sort((a,b)=>a.exp.localeCompare(b.exp));
  if (!items.length) { el.innerHTML='<div class="empty-state">打折專區暫無商品</div>'; return; }
  el.innerHTML = items.map(item=>{
    const disc = item.price * 0.7;
    return `<div class="disc-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:14px;font-weight:700">${item.name}</div>
          <div style="font-size:12px;color:var(--sub)">${item.cat} | 到期：${item.exp}</div>
        </div>
        <span class="disc-badge">打折中</span>
      </div>
      <div style="margin-top:6px;display:flex;align-items:baseline;gap:8px">
        <div class="disc-price">$${disc.toFixed(0)}</div>
        <div class="disc-original">原價 $${item.price}</div>
        <div style="font-size:11px;color:var(--orange);font-weight:700">7折優惠</div>
      </div>
      <div class="item-actions" style="margin-top:8px">
        <button class="btn-small btn-restore" onclick="toggleDiscount(${item.id})">取消打折</button>
        <button class="btn-small btn-del" onclick="deleteItem(${item.id})">刪除</button>
      </div>
    </div>`;
  }).join('');
}

// ===================== TABS =====================
function switchTab(t) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  const tabs = ['scan','inventory','calendar','alerts','discount'];
  document.querySelectorAll('.tab')[tabs.indexOf(t)].classList.add('active');
  if (t==='calendar') renderCalendar();
}

// ===================== INIT =====================
window.addEventListener('load', ()=>{
  detectEngine();
  initCal();
  renderInventory();
  renderAlerts();
  renderDiscount();
  updateBadge();

  // auto check on load
  setTimeout(()=>{
    const urgent = inventory.filter(i=>{ const d=daysUntil(i.exp); return d>=0&&d<=3; });
    if (urgent.length) {
      setStatus(`警告：有 ${urgent.length} 件商品即將到期！`, 'error');
    }
    // auto promote 30-day items to discount
    let changed = false;
    inventory.forEach(i=>{
      const d = daysUntil(i.exp);
      if (d>=0 && d<=30 && !i.discount) { i.discount=true; changed=true; }
    });
    if (changed) saveData();
  }, 800);
});
</script>
