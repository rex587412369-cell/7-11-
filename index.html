<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>7-11 即期品管理系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #f5f5f5;
    color: #222;
    min-height: 100vh;
  }
  header {
    background: #007b3a;
    color: #fff;
    padding: 14px 16px;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header span { font-size: 22px; }

  /* TAB NAV */
  .tab-nav {
    display: flex;
    background: #fff;
    border-bottom: 2px solid #e0e0e0;
    position: sticky;
    top: 51px;
    z-index: 99;
  }
  .tab-btn {
    flex: 1;
    padding: 11px 4px;
    border: none;
    background: none;
    font-size: 13px;
    color: #888;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .2s;
    font-family: inherit;
  }
  .tab-btn.active {
    color: #007b3a;
    border-bottom-color: #007b3a;
    font-weight: bold;
  }

  /* PAGES */
  .page { display: none; padding: 14px; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card h3 {
    font-size: 15px;
    color: #007b3a;
    margin-bottom: 10px;
    border-bottom: 1px solid #e8e8e8;
    padding-bottom: 8px;
  }

  /* FORM */
  label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  input[type=text], input[type=date], input[type=number], select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #ddd;
    border-radius: 7px;
    font-size: 14px;
    margin-bottom: 10px;
    font-family: inherit;
    background: #fafafa;
  }
  input:focus, select:focus { outline: none; border-color: #007b3a; background: #fff; }

  .btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .2s;
  }
  .btn:active { opacity: .7; }
  .btn-green { background: #007b3a; color: #fff; }
  .btn-gray { background: #e0e0e0; color: #444; }
  .btn-orange { background: #e65c00; color: #fff; }
  .btn-sm {
    width: auto;
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }

  /* CAMERA */
  #camera-area {
    display: none;
    position: relative;
    margin-bottom: 12px;
  }
  #scanner-video {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    border-radius: 8px;
    background: #000;
    display: block;
  }
  .scan-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 65%;
    height: 50%;
    border: 2px solid #00e676;
    border-radius: 4px;
    pointer-events: none;
  }
  .scan-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00e676, transparent);
    animation: scanline 2s linear infinite;
  }
  @keyframes scanline {
    0% { top: 0; }
    100% { top: 100%; }
  }
  #scan-status {
    text-align: center;
    font-size: 12px;
    padding: 5px;
    color: #555;
    background: #f0f0f0;
    border-radius: 0 0 8px 8px;
  }
  #scan-status.ok { background: #e8f5e9; color: #2e7d32; }
  #scan-status.err { background: #fbe9e7; color: #bf360c; }

  /* LIBRARY STATUS BADGE */
  #lib-status {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    margin-bottom: 10px;
    display: inline-block;
  }
  #lib-status.loading { background: #fff3e0; color: #e65c00; }
  #lib-status.ready { background: #e8f5e9; color: #2e7d32; }
  #lib-status.failed { background: #fbe9e7; color: #c62828; }

  /* PRODUCT LIST */
  .product-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .product-item:last-child { border-bottom: none; }
  .product-badge {
    min-width: 44px;
    height: 44px;
    border-radius: 8px;
    background: #e8f5e9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: #007b3a;
    text-align: center;
    line-height: 1.2;
  }
  .product-badge.warn { background: #fff3e0; color: #e65c00; }
  .product-badge.danger { background: #fbe9e7; color: #c62828; }
  .product-badge.discount { background: #fce4ec; color: #c2185b; }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-meta { font-size: 11px; color: #888; margin-top: 2px; }
  .product-actions { display: flex; gap: 5px; flex-direction: column; align-items: flex-end; }

  /* ALERTS */
  .alert-banner {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 10px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .alert-red { background: #fbe9e7; color: #b71c1c; border-left: 4px solid #e53935; }
  .alert-orange { background: #fff3e0; color: #bf360c; border-left: 4px solid #fb8c00; }
  .alert-green { background: #e8f5e9; color: #1b5e20; border-left: 4px solid #43a047; }
  .alert-pink { background: #fce4ec; color: #880e4f; border-left: 4px solid #e91e63; }

  /* CALENDAR */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cal-header h3 { font-size: 15px; color: #007b3a; }
  .cal-nav { background: none; border: 1px solid #ddd; border-radius: 6px; width: 30px; height: 30px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-day-name {
    text-align: center;
    font-size: 11px;
    color: #888;
    padding: 4px 0;
    font-weight: bold;
  }
  .cal-cell {
    min-height: 36px;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2px;
    position: relative;
    cursor: pointer;
    transition: background .15s;
    background: #fafafa;
  }
  .cal-cell:hover { background: #e8f5e9; }
  .cal-cell.today { background: #007b3a; }
  .cal-cell.today .cal-date { color: #fff; font-weight: bold; }
  .cal-cell.other-month .cal-date { color: #ccc; }
  .cal-cell.has-expiry { background: #fff3e0; }
  .cal-cell.has-expiry.today { background: #007b3a; }
  .cal-cell.has-danger { background: #fbe9e7; }
  .cal-cell.has-danger.today { background: #c62828; }
  .cal-cell.has-discount { outline: 2px solid #e91e63; }
  .cal-date { font-size: 12px; color: #444; line-height: 1.8; }
  .cal-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin: 1px;
  }
  .dot-green { background: #007b3a; }
  .dot-orange { background: #fb8c00; }
  .dot-red { background: #e53935; }
  .dot-pink { background: #e91e63; }
  .cal-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
    font-size: 11px;
    color: #666;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 3px;
    vertical-align: middle;
  }

  /* CALENDAR EVENT LIST */
  .cal-events-title {
    font-size: 13px;
    font-weight: bold;
    color: #007b3a;
    margin: 12px 0 8px;
  }

  /* DISCOUNT ZONE */
  .discount-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .discount-badge {
    background: #e91e63;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 12px;
  }

  /* SEARCH */
  .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .search-row input { flex: 1; margin-bottom: 0; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff;
    width: 100%;
    border-radius: 16px 16px 0 0;
    padding: 20px 16px 32px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 16px;
    font-weight: bold;
    color: #007b3a;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #eee;
  }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: #bbb;
    font-size: 13px;
  }

  /* NOTIFICATION */
  .notif-bar {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 999;
    display: none;
    max-width: 90%;
    text-align: center;
  }
  .notif-bar.show { display: block; }
</style>

<body>

<header>
  <span>[7]</span> 7-11 即期品管理系統
</header>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('scan')">掃描登錄</button>
  <button class="tab-btn" onclick="switchTab('list')">商品清單</button>
  <button class="tab-btn" onclick="switchTab('calendar')">行事曆</button>
  <button class="tab-btn" onclick="switchTab('discount')">打折專區</button>
  <button class="tab-btn" onclick="switchTab('alert')">提醒</button>
</div>

<div class="notif-bar" id="notif-bar"></div>

<!-- ==================== PAGE: SCAN ==================== -->
<div class="page active" id="page-scan">

  <div class="card">
    <h3>條碼掃描登錄</h3>
    <div id="lib-status" class="loading">函式庫載入中...</div>

    <div id="camera-area">
      <video id="scanner-video" autoplay muted playsinline></video>
      <div class="scan-overlay">
        <div class="scan-line"></div>
      </div>
      <div id="scan-status">對準條碼掃描中...</div>
    </div>

    <button class="btn btn-green" id="btn-scan" onclick="startScan()">開啟相機掃描</button>
    <button class="btn btn-gray" id="btn-stop" onclick="stopScan()" style="display:none;margin-top:8px;">停止掃描</button>
  </div>

  <div class="card">
    <h3>商品資訊</h3>
    <label>條碼號碼</label>
    <div style="display:flex;gap:8px;">
      <input type="text" id="input-barcode" placeholder="掃描後自動填入，或手動輸入" style="margin-bottom:0;flex:1;">
      <button class="btn btn-sm btn-gray" onclick="lookupBarcode()">查詢</button>
    </div>
    <div style="margin-bottom:10px;"></div>

    <label>商品名稱</label>
    <input type="text" id="input-name" placeholder="掃描後自動帶入，或手動輸入">

    <label>商品分類</label>
    <select id="input-cat">
      <option value="飲料">飲料</option>
      <option value="食品">食品</option>
      <option value="麵包點心">麵包點心</option>
      <option value="乳製品">乳製品</option>
      <option value="零食">零食</option>
      <option value="冷凍品">冷凍品</option>
      <option value="日用品">日用品</option>
      <option value="其他">其他</option>
    </select>

    <label>到期日</label>
    <input type="date" id="input-expiry">

    <label>數量</label>
    <input type="number" id="input-qty" value="1" min="1">

    <label>原價 (元)</label>
    <input type="number" id="input-price" placeholder="選填">

    <button class="btn btn-green" onclick="addProduct()">新增即期品</button>
  </div>
</div>

<!-- ==================== PAGE: LIST ==================== -->
<div class="page" id="page-list">
  <div class="card">
    <h3>即期品清單</h3>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="搜尋商品名稱..." oninput="renderList()">
      <select id="sort-select" onchange="renderList()" style="margin-bottom:0;width:auto;padding:9px 8px;">
        <option value="expiry">依到期日</option>
        <option value="name">依名稱</option>
        <option value="cat">依分類</option>
      </select>
    </div>
    <div id="product-list"></div>
  </div>
</div>

<!-- ==================== PAGE: CALENDAR ==================== -->
<div class="page" id="page-calendar">
  <div class="card">
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">&#8249;</button>
      <h3 id="cal-title"></h3>
      <button class="cal-nav" onclick="calNext()">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend">
      <span><span class="legend-dot" style="background:#e8f5e9;border:1px solid #007b3a;"></span>有即期品</span>
      <span><span class="legend-dot" style="background:#fff3e0;border:1px solid #fb8c00;"></span>30天內到期</span>
      <span><span class="legend-dot" style="background:#fbe9e7;border:1px solid #e53935;"></span>7天內到期</span>
      <span><span class="legend-dot" style="background:#fff;border:2px solid #e91e63;"></span>打折提醒</span>
    </div>
    <div id="cal-events"></div>
  </div>
</div>

<!-- ==================== PAGE: DISCOUNT ==================== -->
<div class="page" id="page-discount">
  <div class="card">
    <div class="discount-header">
      <h3 style="margin:0;border:none;padding:0;">打折專區</h3>
      <span class="discount-badge" id="discount-count">0 項</span>
    </div>
    <p style="font-size:12px;color:#888;margin-bottom:10px;">30天內到期商品，建議移入打折專區處理</p>
    <div id="discount-list"></div>
  </div>
</div>

<!-- ==================== PAGE: ALERT ==================== -->
<div class="page" id="page-alert">
  <div id="alert-list"></div>
</div>

<!-- MODAL: Calendar Day Detail -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title">當日即期品</div>
    <div id="modal-content"></div>
    <button class="btn btn-gray" onclick="closeModal()" style="margin-top:14px;">關閉</button>
  </div>
</div>

let scannerReady = false;
let ZXingLib = null;
let scanStream = null;
let scanning = false;
let scanCanvas = null;
let scanCtx = null;
let scanAnimFrame = null;
let codeReader = null;

function setLibStatus(state, msg) {
  const el = document.getElementById('lib-status');
  el.className = state;
  el.textContent = msg;
}

// Try ZXing UMD
function loadZXing() {
  setLibStatus('loading', '條碼函式庫載入中...');
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js';
    script.onload = () => {
      if (window.ZXing) {
        ZXingLib = window.ZXing;
        scannerReady = true;
        setLibStatus('ready', '條碼函式庫就緒 (ZXing)');
        resolve('zxing');
      } else {
        reject('ZXing not on window');
      }
    };
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

// Fallback: canvas + manual decode via BarcodeDetector API
function tryNativeBarcodeDetector() {
  if ('BarcodeDetector' in window) {
    scannerReady = true;
    setLibStatus('ready', '條碼函式庫就緒 (原生)');
    return true;
  }
  return false;
}

// Fallback 2: Use quagga2
function loadQuagga() {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/quagga2@0.1.0/dist/quagga.min.js';
    s.onload = () => {
      if (window.Quagga) {
        scannerReady = true;
        setLibStatus('ready', '條碼函式庫就緒 (Quagga2)');
        resolve('quagga');
      } else reject();
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function initLibraries() {
  // 1. Try ZXing
  try {
    await loadZXing();
    return;
  } catch(e) {}

  // 2. Try native BarcodeDetector
  if (tryNativeBarcodeDetector()) return;

  // 3. Try Quagga2
  try {
    await loadQuagga();
    return;
  } catch(e) {}

  // All failed
  setLibStatus('failed', '無法載入函式庫，請重新整理');
  showNotif('條碼函式庫載入失敗，將使用手動模式', 4000);
  scannerReady = false;
}

// ============================================================
// SCAN
// ============================================================
async function startScan() {
  if (!scannerReady) {
    showNotif('函式庫尚未就緒，請稍候再試');
    return;
  }

  document.getElementById('camera-area').style.display = 'block';
  document.getElementById('btn-scan').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'block';

  try {
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    };
    scanStream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch(e) {
    try {
      scanStream = await navigator.mediaDevices.getUserMedia({ video: true });
    } catch(e2) {
      setScanStatus('err', '無法存取相機：' + e2.message);
      stopScan();
      return;
    }
  }

  const video = document.getElementById('scanner-video');
  video.srcObject = scanStream;

  await new Promise(resolve => {
    video.onloadedmetadata = resolve;
    setTimeout(resolve, 2000);
  });

  try { await video.play(); } catch(e) {}

  setScanStatus('', '對準條碼掃描中...');
  scanning = true;

  // Pick scanning method
  if (ZXingLib) {
    startZXingScan(video);
  } else if ('BarcodeDetector' in window) {
    startNativeScan(video);
  } else if (window.Quagga) {
    startQuaggaScan();
  } else {
    setScanStatus('err', '請手動輸入條碼');
  }
}

// ---- ZXing method ----
function startZXingScan(video) {
  scanCanvas = document.createElement('canvas');
  scanCtx = scanCanvas.getContext('2d');

  try {
    const hints = new ZXingLib.Map();
    const formats = [
      ZXingLib.BarcodeFormat.EAN_13,
      ZXingLib.BarcodeFormat.EAN_8,
      ZXingLib.BarcodeFormat.CODE_128,
      ZXingLib.BarcodeFormat.UPC_A,
      ZXingLib.BarcodeFormat.UPC_E,
      ZXingLib.BarcodeFormat.QR_CODE,
    ];
    hints.set(ZXingLib.DecodeHintType.POSSIBLE_FORMATS, formats);
    const reader = new ZXingLib.MultiFormatReader();
    reader.setHints(hints);

    function tick() {
      if (!scanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        scanCanvas.width = video.videoWidth;
        scanCanvas.height = video.videoHeight;
        scanCtx.drawImage(video, 0, 0);
        try {
          const imgData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
          const luminance = new ZXingLib.RGBLuminanceSource(imgData.data, scanCanvas.width, scanCanvas.height);
          const binary = new ZXingLib.HybridBinarizer(luminance);
          const bitmap = new ZXingLib.BinaryBitmap(binary);
          const result = reader.decode(bitmap);
          if (result && result.getText()) {
            handleBarcodeDetected(result.getText());
            return;
          }
        } catch(e) {}
      }
      scanAnimFrame = requestAnimationFrame(tick);
    }
    tick();
  } catch(e) {
    setScanStatus('err', 'ZXing 初始化失敗: ' + e.message);
  }
}

// ---- Native BarcodeDetector method ----
function startNativeScan(video) {
  const detector = new BarcodeDetector({
    formats: ['ean_13','ean_8','code_128','upc_a','upc_e','qr_code']
  });
  async function tick() {
    if (!scanning) return;
    try {
      const barcodes = await detector.detect(video);
      if (barcodes.length > 0) {
        handleBarcodeDetected(barcodes[0].rawValue);
        return;
      }
    } catch(e) {}
    scanAnimFrame = requestAnimationFrame(tick);
  }
  tick();
}

// ---- Quagga method ----
function startQuaggaScan() {
  const video = document.getElementById('scanner-video');
  Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target: video,
      constraints: { facingMode: 'environment' }
    },
    decoder: {
      readers: ['ean_reader','ean_8_reader','code_128_reader','upc_reader']
    }
  }, err => {
    if (err) { setScanStatus('err', 'Quagga 啟動失敗'); return; }
    Quagga.start();
    Quagga.onDetected(data => {
      if (data.codeResult && data.codeResult.code) {
        handleBarcodeDetected(data.codeResult.code);
      }
    });
  });
}

function stopScan() {
  scanning = false;
  if (scanAnimFrame) cancelAnimationFrame(scanAnimFrame);

  if (window.Quagga) { try { Quagga.stop(); } catch(e) {} }

  if (scanStream) {
    scanStream.getTracks().forEach(t => t.stop());
    scanStream = null;
  }
  const video = document.getElementById('scanner-video');
  video.srcObject = null;

  document.getElementById('camera-area').style.display = 'none';
  document.getElementById('btn-scan').style.display = 'block';
  document.getElementById('btn-stop').style.display = 'none';
  setScanStatus('', '對準條碼掃描中...');
}

function setScanStatus(type, msg) {
  const el = document.getElementById('scan-status');
  el.className = type;
  el.textContent = msg;
}

function handleBarcodeDetected(code) {
  stopScan();
  document.getElementById('input-barcode').value = code;
  setScanStatus('ok', '掃描成功：' + code);
  showNotif('掃描成功：' + code);
  lookupBarcode();
}

function lookupBarcode() {
  const code = document.getElementById('input-barcode').value.trim();
  if (!code) return;
  const product = BARCODE_DB[code];
  if (product) {
    document.getElementById('input-name').value = product.name;
    document.getElementById('input-cat').value = product.cat;
    if (product.price) document.getElementById('input-price').value = product.price;
    showNotif('已找到商品：' + product.name);
  } else {
    document.getElementById('input-name').value = '';
    showNotif('未收錄此條碼，請手動輸入商品名稱', 3000);
  }
}

function addProduct() {
  const name = document.getElementById('input-name').value.trim();
  const expiry = document.getElementById('input-expiry').value;
  if (!name) { showNotif('請輸入商品名稱'); return; }
  if (!expiry) { showNotif('請設定到期日'); return; }

  const p = {
    id: genId(),
    barcode: document.getElementById('input-barcode').value.trim(),
    name,
    cat: document.getElementById('input-cat').value,
    expiry,
    qty: parseInt(document.getElementById('input-qty').value) || 1,
    price: parseFloat(document.getElementById('input-price').value) || 0,
    addedAt: new Date().toISOString().split('T')[0],
    inDiscount: false
  };

  products.push(p);
  saveProducts();
  showNotif('已新增：' + name);

  // Reset
  document.getElementById('input-barcode').value = '';
  document.getElementById('input-name').value = '';
  document.getElementById('input-expiry').value = '';
  document.getElementById('input-qty').value = '1';
  document.getElementById('input-price').value = '';

  renderAll();
  checkAutoDiscount(p);
}

function checkAutoDiscount(p) {
  const days = daysUntil(p.expiry);
  if (days <= 30 && days >= 0) {
    if (!p.inDiscount) {
      p.inDiscount = true;
      saveProducts();
      showNotif('提醒：' + p.name + ' 將在 ' + days + ' 天後到期，已標記至打折專區', 5000);
    }
  }
}

function deleteProduct(id) {
  products = products.filter(p => p.id !== id);
  saveProducts();
  renderAll();
  showNotif('已刪除商品');
}

function toggleDiscount(id) {
  const p = products.find(x => x.id === id);
  if (p) {
    p.inDiscount = !p.inDiscount;
    saveProducts();
    renderAll();
    showNotif(p.inDiscount ? '已移入打折專區' : '已移出打折專區');
  }
}

function markSold(id) {
  deleteProduct(id);
  showNotif('已標記售出並移除');
}

// ============================================================
// HELPERS
// ============================================================
function daysUntil(dateStr) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function getDayClass(days) {
  if (days < 0) return 'danger'; // expired
  if (days <= 7) return 'danger';
  if (days <= 30) return 'warn';
  return '';
}

function getDayLabel(days) {
  if (days < 0) return '已過期';
  if (days === 0) return '今天到期';
  if (days === 1) return '明天到期';
  return days + '天後到期';
}

function showNotif(msg, duration) {
  const el = document.getElementById('notif-bar');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration || 2500);
}

function renderList() {
  const keyword = (document.getElementById('search-input')?.value || '').toLowerCase();
  const sort = document.getElementById('sort-select')?.value || 'expiry';
  const el = document.getElementById('product-list');

  let list = products.filter(p => !keyword || p.name.toLowerCase().includes(keyword));
  if (sort === 'expiry') list.sort((a,b) => a.expiry.localeCompare(b.expiry));
  if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === 'cat') list.sort((a,b) => a.cat.localeCompare(b.cat));

  if (!list.length) {
    el.innerHTML = '<div class="empty-state">目前沒有即期品記錄</div>';
    return;
  }

  el.innerHTML = list.map(p => {
    const days = daysUntil(p.expiry);
    const cls = getDayClass(days);
    const label = getDayLabel(days);
    return `
    <div class="product-item">
      <div class="product-badge ${cls}${p.inDiscount?' discount':''}">
        ${p.inDiscount ? '打折' : (days < 0 ? '過期' : days + 'd')}
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-meta">${p.cat} | 到期：${p.expiry} | ${label} | 數量：${p.qty}${p.price ? ' | 原價：$'+p.price : ''}</div>
      </div>
      <div class="product-actions">
        <button class="btn btn-sm btn-orange" onclick="toggleDiscount('${p.id}')">${p.inDiscount?'移出打折':'移入打折'}</button>
        <button class="btn btn-sm btn-gray" onclick="deleteProduct('${p.id}')">刪除</button>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// CALENDAR
// ============================================================
let calYear, calMonth;
{
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
}

function calPrev() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function calNext() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const DAYS = ['日','一','二','三','四','五','六'];
  document.getElementById('cal-title').textContent = calYear + ' 年 ' + MONTHS[calMonth];

  const today = new Date();
  today.setHours(0,0,0,0);

  // Build product map: date -> list
  const productMap = {};
  products.forEach(p => {
    if (!productMap[p.expiry]) productMap[p.expiry] = [];
    productMap[p.expiry].push(p);
  });

  // First day of month
  const firstDay = new Date(calYear, calMonth, 1);
  const startDow = firstDay.getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = DAYS.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  // Pad start
  for (let i = 0; i < startDow; i++) {
    const prevDate = new Date(calYear, calMonth, -startDow + i + 1);
    html += `<div class="cal-cell other-month"><div class="cal-date">${prevDate.getDate()}</div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const cellDate = new Date(calYear, calMonth, d);
    const isToday = cellDate.getTime() === today.getTime();
    const dayProds = productMap[dateStr] || [];
    const days = Math.round((cellDate - today) / 86400000);

    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (dayProds.length > 0) {
      if (days <= 7) cls += ' has-danger';
      else if (days <= 30) cls += ' has-expiry';
      else cls += ' has-expiry';
    }
    if (dayProds.some(p => p.inDiscount)) cls += ' has-discount';

    let dots = '';
    if (dayProds.length > 0) {
      if (days < 0) dots += '<div class="cal-dot dot-red"></div>';
      else if (days <= 7) dots += '<div class="cal-dot dot-red"></div>';
      else if (days <= 30) dots += '<div class="cal-dot dot-orange"></div>';
      else dots += '<div class="cal-dot dot-green"></div>';
      if (dayProds.some(p => p.inDiscount)) dots += '<div class="cal-dot dot-pink"></div>';
    }

    html += `<div class="${cls}" onclick="showCalDay('${dateStr}')">
      <div class="cal-date">${d}</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;">${dots}</div>
    </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
  renderCalendarEvents();
}

function renderCalendarEvents() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const next30 = new Date(today.getTime() + 30 * 86400000);

  const upcoming = products
    .filter(p => {
      const d = new Date(p.expiry);
      return d >= today && d <= next30;
    })
    .sort((a,b) => a.expiry.localeCompare(b.expiry));

  const el = document.getElementById('cal-events');
  if (!upcoming.length) {
    el.innerHTML = '<div class="cal-events-title">未來 30 天無即期品</div>';
    return;
  }

  el.innerHTML = '<div class="cal-events-title">未來 30 天即期品 (' + upcoming.length + ' 項)</div>' +
    upcoming.map(p => {
      const days = daysUntil(p.expiry);
      const cls = getDayClass(days);
      return `<div class="product-item">
        <div class="product-badge ${cls}">${days === 0 ? '今天' : days + 'd'}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-meta">到期：${p.expiry}${p.inDiscount ? ' | 已在打折專區' : ''}</div>
        </div>
      </div>`;
    }).join('');
}

function showCalDay(dateStr) {
  const dayProds = products.filter(p => p.expiry === dateStr);
  const modal = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const content = document.getElementById('modal-content');

  title.textContent = dateStr + ' 即期品';

  if (!dayProds.length) {
    content.innerHTML = '<div class="empty-state">此日期無即期品</div>';
  } else {
    content.innerHTML = dayProds.map(p => {
      const days = daysUntil(p.expiry);
      const cls = getDayClass(days);
      return `<div class="product-item">
        <div class="product-badge ${cls}">${getDayLabel(days)}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-meta">${p.cat} | 數量：${p.qty}${p.inDiscount ? ' | 已在打折專區' : ''}</div>
        </div>
        <div class="product-actions">
          <button class="btn btn-sm btn-orange" onclick="toggleDiscount('${p.id}');closeModal();renderAll();">${p.inDiscount?'移出':'移入打折'}</button>
        </div>
      </div>`;
    }).join('');
  }

  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

// ============================================================
function renderDiscount() {
  // Auto-move products within 30 days to discount
  let autoMoved = 0;
  products.forEach(p => {
    const days = daysUntil(p.expiry);
    if (days >= 0 && days <= 30 && !p.inDiscount) {
      p.inDiscount = true;
      autoMoved++;
    }
  });
  if (autoMoved > 0) saveProducts();

  const discountList = products.filter(p => p.inDiscount)
    .sort((a,b) => a.expiry.localeCompare(b.expiry));

  document.getElementById('discount-count').textContent = discountList.length + ' 項';
  const el = document.getElementById('discount-list');

  if (!discountList.length) {
    el.innerHTML = '<div class="empty-state">目前打折專區無商品</div>';
    return;
  }

  el.innerHTML = discountList.map(p => {
    const days = daysUntil(p.expiry);
    const cls = getDayClass(days);
    const label = getDayLabel(days);
    return `
    <div class="product-item">
      <div class="product-badge ${cls}">${days < 0 ? '過期' : days + 'd'}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-meta">${label} | 數量：${p.qty}${p.price ? ' | 原價：$'+p.price+' | 建議售：$'+Math.round(p.price*0.7) : ''}</div>
      </div>
      <div class="product-actions">
        <button class="btn btn-sm btn-green" onclick="markSold('${p.id}')">已售出</button>
        <button class="btn btn-sm btn-gray" onclick="toggleDiscount('${p.id}')">移出</button>
      </div>
    </div>`;
  }).join('');
}

function renderAlerts() {
  const el = document.getElementById('alert-list');
  let html = '';

  const today = new Date(); today.setHours(0,0,0,0);

  const expired = products.filter(p => daysUntil(p.expiry) < 0);
  const todayExp = products.filter(p => daysUntil(p.expiry) === 0);
  const week = products.filter(p => { const d = daysUntil(p.expiry); return d > 0 && d <= 7; });
  const month = products.filter(p => { const d = daysUntil(p.expiry); return d > 7 && d <= 30; });

  if (expired.length) {
    html += `<div class="card"><h3>已過期商品 (${expired.length})</h3>` +
      expired.map(p => alertItem(p, 'danger')).join('') + '</div>';
  }

  if (todayExp.length) {
    html += `<div class="card"><h3>今日到期 (${todayExp.length})</h3>
      <div class="alert-banner alert-red">今日到期商品請立即處理或移入打折專區！</div>` +
      todayExp.map(p => alertItem(p, 'danger')).join('') + '</div>';
  }

  if (week.length) {
    html += `<div class="card"><h3>7 天內到期 (${week.length})</h3>
      <div class="alert-banner alert-orange">建議盡快移入打折專區！</div>` +
      week.map(p => alertItem(p, 'warn')).join('') + '</div>';
  }

  if (month.length) {
    html += `<div class="card"><h3>30 天內到期 (${month.length})</h3>
      <div class="alert-banner alert-pink">請留意以下商品將在一個月內到期，到期前請移入打折專區。</div>` +
      month.map(p => alertItem(p, 'warn')).join('') + '</div>';
  }

  if (!html) {
    html = '<div class="card"><div class="empty-state">目前沒有即將到期的商品</div></div>';
  }

  el.innerHTML = html;
}

function alertItem(p, cls) {
  const days = daysUntil(p.expiry);
  return `<div class="product-item">
    <div class="product-badge ${cls}">${days < 0 ? '過期' : (days === 0 ? '今天' : days + 'd')}</div>
    <div class="product-info">
      <div class="product-name">${p.name}</div>
      <div class="product-meta">到期：${p.expiry} | ${getDayLabel(days)}${p.inDiscount ? ' | 已在打折專區' : ''}</div>
    </div>
    <div class="product-actions">
      ${!p.inDiscount ? `<button class="btn btn-sm btn-orange" onclick="moveToDiscount('${p.id}')">移入打折</button>` : ''}
    </div>
  </div>`;
}

function moveToDiscount(id) {
  const p = products.find(x => x.id === id);
  if (p) { p.inDiscount = true; saveProducts(); renderAlerts(); renderAll(); showNotif('已移入打折專區'); }
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  renderList();
  renderCalendar();
  renderDiscount();
  renderAlerts();
}

// ============================================================
// DAILY REMINDER CHECK
// ============================================================
function runDailyCheck() {
  const toAlert = products.filter(p => {
    const d = daysUntil(p.expiry);
    return d >= 0 && d <= 30;
  });

  if (toAlert.length > 0) {
    const todayItems = toAlert.filter(p => daysUntil(p.expiry) === 0);
    const weekItems = toAlert.filter(p => { const d = daysUntil(p.expiry); return d > 0 && d <= 7; });

    if (todayItems.length > 0) {
      showNotif('今日有 ' + todayItems.length + ' 項商品到期！請立即處理', 6000);
    } else if (weekItems.length > 0) {
      setTimeout(() => showNotif(weekItems.length + ' 項商品將在 7 天內到期，請移入打折專區', 5000), 3000);
    } else {
      setTimeout(() => showNotif(toAlert.length + ' 項商品將在 30 天內到期', 4000), 3000);
    }

    // Auto-flag discount
    toAlert.forEach(p => { if (!p.inDiscount) p.inDiscount = true; });
    saveProducts();
  }
}

// ============================================================
// INIT
// ============================================================
initLibraries();
renderAll();
setTimeout(runDailyCheck, 1500);

// Set default expiry date to today + 7 days
(function() {
  const d = new Date();
  d.setDate(d.getDate() + 7);
  document.getElementById('input-expiry').value = d.toISOString().split('T')[0];
})();
</script>
