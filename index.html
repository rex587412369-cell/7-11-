<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>即期品管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #e8c547;
    --accent2: #e8a847;
    --red: #e85447;
    --green: #47e8a0;
    --blue: #4788e8;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --radius: 14px;
    --font: 'Noto Sans TC', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .app-title span { color: var(--accent); }
  .header-stats { display: flex; gap: 12px; margin-top: 10px; }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text2);
    display: flex; align-items: center; gap: 6px;
  }
  .stat-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--accent); }
  .dot-green { background: var(--green); }

  /* ── Filter Tabs ── */
  .filter-bar {
    display: flex; gap: 8px;
    padding: 12px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-tab {
    flex-shrink: 0;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* ── List ── */
  .list-wrap { padding: 0 20px 120px; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin: 20px 0 10px;
  }

  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.15s, opacity 0.15s;
    animation: slideIn 0.25s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .item-card:active { transform: scale(0.98); }

  .item-urgency {
    width: 4px; height: 48px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .urgency-red { background: var(--red); }
  .urgency-yellow { background: var(--accent); }
  .urgency-green { background: var(--green); }

  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 15px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .item-meta { display: flex; align-items: center; gap: 8px; }
  .item-category {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 7px;
    color: var(--text2);
  }
  .item-date {
    font-size: 12px;
    color: var(--text2);
    font-family: var(--mono);
  }

  .item-countdown {
    text-align: right; flex-shrink: 0;
  }
  .countdown-num {
    font-size: 22px; font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
  }
  .countdown-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 28px; right: 24px;
    width: 56px; height: 56px;
    background: var(--accent);
    border-radius: 18px;
    border: none;
    color: #000;
    font-size: 26px; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(232,197,71,0.4);
    z-index: 200;
    transition: all 0.2s;
  }
  .fab:active { transform: scale(0.93); }

  /* ── Modal Backdrop ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 300;
    align-items: flex-end;
  }
  .modal-backdrop.open { display: flex; }

  /* ── Action Sheet ── */
  .action-sheet {
    width: 100%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 12px 20px 40px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .sheet-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 14px;
    transition: all 0.15s;
  }
  .sheet-btn:hover { border-color: var(--accent); }
  .sheet-btn-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .sheet-btn-text { flex: 1; }
  .sheet-btn-title { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
  .sheet-btn-sub { font-size: 12px; color: var(--text2); }

  /* ── Scanner Modal ── */
  .scanner-modal {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    z-index: 400;
    flex-direction: column;
  }
  .scanner-modal.open { display: flex; }

  .scanner-header {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 52px 20px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    display: flex; align-items: center; justify-content: space-between;
  }
  .scanner-title { font-size: 17px; font-weight: 600; color: #fff; }
  .scanner-close {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none; color: #fff;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  #scanner-video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .scanner-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 260px; height: 180px;
    position: relative;
  }
  .scan-frame::before, .scan-frame::after,
  .scan-frame-inner::before, .scan-frame-inner::after {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--accent);
    border-style: solid;
  }
  .scan-frame::before  { top: 0;    left: 0;  border-width: 3px 0 0 3px; }
  .scan-frame::after   { top: 0;    right: 0; border-width: 3px 3px 0 0; }
  .scan-frame-inner::before { bottom: 0; left: 0;  border-width: 0 0 3px 3px; }
  .scan-frame-inner::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent);
  }
  @keyframes scanline {
    0%   { top: 0; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .scanner-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 20px 48px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    text-align: center;
  }
  .scanner-hint { color: rgba(255,255,255,0.7); font-size: 14px; }

  /* camera start button */
  .camera-start-wrap {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; background: #000;
    z-index: 5;
  }
  .camera-start-btn {
    padding: 16px 36px;
    border-radius: 50px;
    background: var(--accent);
    border: none;
    color: #000;
    font-size: 16px; font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .camera-start-btn:active { transform: scale(0.96); }
  .camera-start-desc { color: var(--text2); font-size: 14px; text-align: center; padding: 0 40px; line-height: 1.6; }

  /* scanner status bar */
  .scanner-status {
    position: absolute; top: 110px; left: 0; right: 0;
    z-index: 10; text-align: center;
    pointer-events: none;
  }
  .scanner-status-pill {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.3s;
  }
  .status-scanning { background: rgba(232,197,71,0.15); color: var(--accent); border: 1px solid rgba(232,197,71,0.3); }
  .status-found    { background: rgba(71,232,160,0.2);  color: var(--green);  border: 1px solid rgba(71,232,160,0.4); }
  .status-error    { background: rgba(232,84,71,0.2);   color: var(--red);    border: 1px solid rgba(232,84,71,0.4); }

  /* ── Add Form Modal ── */
  .form-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 400;
    align-items: flex-end;
  }
  .form-modal.open { display: flex; }

  .form-sheet {
    width: 100%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 12px 20px 48px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    max-height: 90dvh;
    overflow-y: auto;
  }

  .form-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--accent); }

  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  .barcode-found-banner {
    background: rgba(71,232,160,0.1);
    border: 1px solid rgba(71,232,160,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--green);
    display: none;
  }
  .barcode-found-banner.show { display: block; }

  .btn-submit {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .btn-submit:active { opacity: 0.85; }
  .btn-cancel {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: var(--font);
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.15s;
  }

  /* ── Error / Empty ── */
  .error-box {
    position: absolute; bottom: 80px; left: 20px; right: 20px;
    background: rgba(232,84,71,0.15);
    border: 1px solid rgba(232,84,71,0.4);
    border-radius: 14px;
    padding: 16px;
    color: var(--red);
    font-size: 14px;
    line-height: 1.6;
    z-index: 20;
    display: none;
  }
  .error-box.show { display: block; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-title { font-size: 17px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; line-height: 1.6; }

  /* ── Notification Toast ── */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 12px 20px;
    font-size: 14px; font-weight: 500;
    z-index: 999;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Edit qty ── */
  .qty-wrap { display: flex; align-items: center; gap: 10px; }
  .qty-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .qty-input {
    flex: 1;
    text-align: center;
  }

  .permission-guide {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    text-align: center;
    line-height: 1.7;
    padding: 0 30px;
  }
  .permission-guide strong { color: var(--accent); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-row">
    <div class="app-title">即期<span>.</span>管理</div>
    <div style="font-size:12px;color:var(--text3);font-family:var(--mono)" id="today-date"></div>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><span class="dot dot-red"></span><span id="stat-urgent">0</span> 緊急</div>
    <div class="stat-pill"><span class="dot dot-yellow"></span><span id="stat-soon">0</span> 即將到期</div>
    <div class="stat-pill"><span class="dot dot-green"></span><span id="stat-ok">0</span> 安全</div>
  </div>
</div>

<!-- Filter Tabs -->
<div class="filter-bar">
  <button class="filter-tab active" data-filter="all">全部</button>
  <button class="filter-tab" data-filter="urgent">緊急</button>
  <button class="filter-tab" data-filter="soon">即將到期</button>
  <button class="filter-tab" data-filter="ok">安全</button>
  <button class="filter-tab" data-filter="drink">飲料</button>
  <button class="filter-tab" data-filter="food">食品</button>
  <button class="filter-tab" data-filter="dairy">乳製品</button>
  <button class="filter-tab" data-filter="snack">零食</button>
  <button class="filter-tab" data-filter="daily">日用品</button>
</div>

<!-- List -->
<div class="list-wrap" id="list-wrap"></div>

<!-- FAB -->
<button class="fab" id="fab-btn">+</button>

<!-- Action Sheet -->
<div class="modal-backdrop" id="action-sheet-backdrop">
  <div class="action-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">新增即期品</div>
    <button class="sheet-btn" id="btn-scan">
      <div class="sheet-btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="21" y2="14"/><line x1="14" y1="21" x2="21" y2="21"/><line x1="21" y1="14" x2="21" y2="21"/></svg>
      </div>
      <div class="sheet-btn-text">
        <div class="sheet-btn-title">掃描條碼</div>
        <div class="sheet-btn-sub">EAN-13 / QR Code 自動辨識商品</div>
      </div>
    </button>
    <button class="sheet-btn" id="btn-manual">
      <div class="sheet-btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <div class="sheet-btn-text">
        <div class="sheet-btn-title">手動輸入</div>
        <div class="sheet-btn-sub">直接填寫商品名稱與日期</div>
      </div>
    </button>
    <button class="sheet-btn" onclick="closeActionSheet()" style="justify-content:center;color:var(--text2)">取消</button>
  </div>
</div>

<!-- Scanner Modal -->
<div class="scanner-modal" id="scanner-modal">
  <div class="scanner-header">
    <div class="scanner-title">掃描條碼</div>
    <button class="scanner-close" onclick="closeScanner()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- Camera start prompt -->
  <div class="camera-start-wrap" id="camera-start-wrap">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    <button class="camera-start-btn" id="camera-start-btn" onclick="startCamera()">啟動相機</button>
    <div class="camera-start-desc">點擊後系統將詢問相機使用權限，請選擇「允許」以開始掃描</div>
    <div class="permission-guide">iOS 設定路徑：<br/><strong>設定 &gt; Safari &gt; 相機 &gt; 允許</strong></div>
  </div>

  <!-- Video -->
  <video id="scanner-video" playsinline muted autoplay></video>

  <!-- Overlay -->
  <div class="scanner-overlay">
    <div class="scan-frame">
      <div class="scan-frame-inner"></div>
      <div class="scan-line"></div>
    </div>
  </div>

  <!-- Status -->
  <div class="scanner-status" id="scanner-status" style="display:none">
    <div class="scanner-status-pill status-scanning" id="scanner-status-pill">掃描中...</div>
  </div>

  <div class="scanner-bottom">
    <div class="scanner-hint" id="scanner-hint">將條碼對準框線內</div>
  </div>

  <div class="error-box" id="scanner-error"></div>
</div>

<!-- Add Form Modal -->
<div class="form-modal" id="form-modal">
  <div class="form-sheet">
    <div class="sheet-handle"></div>
    <div class="form-title" id="form-title">新增商品</div>

    <div class="barcode-found-banner" id="barcode-banner" id="barcode-banner">
      成功辨識條碼 — 商品資訊已自動填入
    </div>

    <div class="form-group">
      <label class="form-label">商品名稱</label>
      <input class="form-input" id="input-name" type="text" placeholder="請輸入商品名稱" />

function today() {
  return new Date().toISOString().slice(0, 10);
}
function daysLeft(dateStr) {
  const d = new Date(dateStr);
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}
function urgency(days) {
  if (days < 0) return 'red';
  if (days <= 2) return 'red';
  if (days <= 7) return 'yellow';
  return 'green';
}
function categoryLabel(cat) {
  return { food:'食品', drink:'飲料', dairy:'乳製品', snack:'零食', daily:'日用品', frozen:'冷凍品', other:'其他' }[cat] || cat;
}
function saveItems() {

}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

  let filtered = items.filter(item => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'urgent') return urgency(daysLeft(item.date)) === 'red';
    if (currentFilter === 'soon') return urgency(daysLeft(item.date)) === 'yellow';
    if (currentFilter === 'ok') return urgency(daysLeft(item.date)) === 'green';
    return item.category === currentFilter;
  });

  // Sort by date asc
  filtered.sort((a,b) => new Date(a.date) - new Date(b.date));

  // Stats
  const urgent = items.filter(i => urgency(daysLeft(i.date)) === 'red').length;
  const soon   = items.filter(i => urgency(daysLeft(i.date)) === 'yellow').length;
  const ok     = items.filter(i => urgency(daysLeft(i.date)) === 'green').length;
  document.getElementById('stat-urgent').textContent = urgent;
  document.getElementById('stat-soon').textContent = soon;
  document.getElementById('stat-ok').textContent = ok;

  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      </div>
      <div class="empty-title">目前無商品</div>
      <div class="empty-sub">點擊右下角 + 按鈕<br>掃描或手動新增即期品</div>
    </div>`;
    return;
  }

  const groups = { red: [], yellow: [], green: [] };
  filtered.forEach(item => groups[urgency(daysLeft(item.date))].push(item));

  const groupTitles = { red: '緊急 / 已過期', yellow: '即將到期 (3-7 天)', green: '安全' };
  let html = '';

  ['red','yellow','green'].forEach(g => {
    if (!groups[g].length) return;
    html += `<div class="section-label">${groupTitles[g]}</div>`;
    groups[g].forEach(item => {
      const days = daysLeft(item.date);
      const ug = urgency(days);
      const color = ug === 'red' ? 'var(--red)' : ug === 'yellow' ? 'var(--accent)' : 'var(--green)';
      const daysText = days < 0 ? `逾期 ${Math.abs(days)} 天` : days === 0 ? '今日到期' : `${days} 天`;
      html += `
      <div class="item-card">
        <div class="item-urgency urgency-${ug}"></div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">
            <div class="item-category">${categoryLabel(item.category)}</div>
            <div class="item-date">${item.date}</div>
            ${item.qty > 1 ? `<div class="item-category">x${item.qty}</div>` : ''}
          </div>
        </div>
        <div class="item-countdown">
          <div class="countdown-num" style="color:${color}">${days < 0 ? '-' + Math.abs(days) : days}</div>
          <div class="countdown-label">${days < 0 ? '天前' : '天後'}</div>
        </div>
        <div class="item-actions">
          <button class="btn-icon danger" onclick="deleteItem('${item.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>
      </div>`;
    });
  });

  wrap.innerHTML = html;
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  saveItems();
  render();
  showToast('已刪除商品');
}

function openScanner() {
  const modal = document.getElementById('scanner-modal');
  modal.classList.add('open');
  document.getElementById('camera-start-wrap').style.display = 'flex';
  document.getElementById('scanner-status').style.display = 'none';
  document.getElementById('scanner-error').classList.remove('show');
  const video = document.getElementById('scanner-video');
  video.style.display = 'none';
}

async function startCamera() {
  const btn = document.getElementById('camera-start-btn');
  btn.textContent = '啟動中...';
  btn.disabled = true;

  const video = document.getElementById('scanner-video');
  const errorBox = document.getElementById('scanner-error');
  errorBox.classList.remove('show');

  try {
    // Try rear camera first
    let stream = null;
    const constraints = [
      { video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
      { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
      { video: { facingMode: 'user' } },
      { video: true }
    ];

    for (const c of constraints) {
      try {
        stream = await navigator.mediaDevices.getUserMedia(c);
        if (stream) break;
      } catch(e) {
        console.warn('Camera constraint failed:', c, e.name);
      }
    }

    if (!stream) throw new Error('NoStream');

    cameraStream = stream;

    // Attach stream to video element manually
    video.srcObject = stream;
    video.setAttribute('playsinline', '');
    video.setAttribute('muted', '');
    video.muted = true;

    // Wait for video to be ready
    await new Promise((resolve, reject) => {
      video.onloadedmetadata = () => resolve();
      video.onerror = (e) => reject(e);
      setTimeout(() => resolve(), 3000); // fallback timeout
    });

    try { await video.play(); } catch(e) { console.warn('play() error:', e); }

    // Hide start prompt, show video
    document.getElementById('camera-start-wrap').style.display = 'none';
    video.style.display = 'block';
    document.getElementById('scanner-status').style.display = 'block';

    // Start ZXing decode loop
    startZxingDecode(video, stream);

  } catch(err) {
    console.error('Camera error:', err);
    btn.textContent = '啟動相機';
    btn.disabled = false;

    let msg = '無法啟動相機：' + err.message;
    if (err.name === 'NotAllowedError' || err.message === 'Permission denied') {
      msg = '相機權限被拒絕。\n\n請至：設定 > Safari > 相機 > 選擇「允許」，然後重新整理頁面再試一次。';
    } else if (err.name === 'NotFoundError') {
      msg = '找不到相機裝置，請確認裝置具有相機。';
    } else if (err.name === 'NotReadableError') {
      msg = '相機已被其他應用程式佔用，請關閉其他使用相機的 App 後再試。';
    } else if (err.name === 'OverconstrainedError') {
      msg = '相機設定不相容，請重試。';
    }
    errorBox.innerHTML = msg.replace(/\n/g, '<br>');
    errorBox.classList.add('show');
  }
}

function startZxingDecode(video, stream) {
  // Load ZXing and start decoding
  if (typeof ZXing === 'undefined') {
    setStatus('error', 'ZXing 函式庫載入失敗，請重新整理頁面');
    return;
  }

  try {
    const hints = new Map();
    const formats = [
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.DATA_MATRIX,
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    zxingReader = new ZXing.BrowserMultiFormatReader(hints);
    scannerActive = true;
    setStatus('scanning', '掃描中...');

    // Use decodeFromStream for manual stream control
    decodeLoop(video);

  } catch(err) {
    console.error('ZXing init error:', err);
    setStatus('error', 'ZXing 初始化失敗: ' + err.message);
  }
}

function decodeLoop(video) {
  if (!scannerActive) return;

  // Use canvas to capture frame
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  function tick() {
    if (!scannerActive) return;
    if (video.readyState < video.HAVE_ENOUGH_DATA) {
      requestAnimationFrame(tick);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    if (canvas.width === 0 || canvas.height === 0) {
      requestAnimationFrame(tick);
      return;
    }

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    try {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const luminance = new ZXing.ZXingBrowser.HTMLCanvasElementLuminanceSource(canvas);
      const binarizer = new ZXing.HybridBinarizer(luminance);
      const binaryBitmap = new ZXing.BinaryBitmap(binarizer);
      const reader = new ZXing.BrowserMultiFormatReader();

      // Try to decode
      try {
        const result = reader.decodeBitmap(binaryBitmap);
        if (result && result.getText()) {
          handleBarcodeDetected(result.getText());
          return; // Stop loop after detection
        }
      } catch(notFound) {
        // NotFoundException is normal when no barcode in frame
      }
    } catch(err) {
      // ignore frame errors
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

function setStatus(type, msg) {
  const pill = document.getElementById('scanner-status-pill');
  const hint = document.getElementById('scanner-hint');
  pill.className = 'scanner-status-pill status-' + type;
  pill.textContent = msg;
  if (type === 'found') hint.textContent = '商品已辨識！';
  else if (type === 'error') hint.textContent = '請嘗試調整角度與距離';
  else hint.textContent = '將條碼對準框線內，保持穩定';
}

function handleBarcodeDetected(code) {
  scannerActive = false;
  setStatus('found', '辨識成功: ' + code);
  console.log('Detected barcode:', code);

  // Vibrate if supported
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

  setTimeout(() => {
    closeScanner();
    const product = PRODUCTS_DB[code];
    openForm({ barcode: code, product });
  }, 600);
}

function closeScanner() {
  scannerActive = false;
  document.getElementById('scanner-modal').classList.remove('open');

  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  const video = document.getElementById('scanner-video');
  video.srcObject = null;
  video.style.display = 'none';
}

function openForm({ barcode = '', product = null } = {}) {
  const modal = document.getElementById('form-modal');
  modal.classList.add('open');

  // Set default date to tomorrow
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('input-date').value = tomorrow.toISOString().slice(0, 10);
  document.getElementById('input-qty').value = 1;
  document.getElementById('input-note').value = '';
  document.getElementById('input-barcode').value = barcode;

  const banner = document.getElementById('barcode-banner');

  if (product) {
    document.getElementById('input-name').value = product.name;
    document.getElementById('input-category').value = product.category;
    banner.textContent = '找到商品: ' + product.name;
    banner.classList.add('show');
    document.getElementById('form-title').textContent = '確認商品資訊';
  } else {
    document.getElementById('input-name').value = '';
    document.getElementById('input-category').value = 'food';
    banner.classList.remove('show');
    document.getElementById('form-title').textContent = barcode ? '找不到商品資料，請手動填寫' : '手動新增商品';
    if (barcode) {
      banner.textContent = '條碼 ' + barcode + ' 不在資料庫，請手動填寫商品名稱';
      banner.style.borderColor = 'rgba(232,197,71,0.4)';
      banner.style.color = 'var(--accent)';
      banner.style.background = 'rgba(232,197,71,0.08)';
      banner.classList.add('show');
    }
  }
}

function closeForm() {
  document.getElementById('form-modal').classList.remove('open');
}
document.getElementById('form-modal').addEventListener('click', function(e) {
  if (e.target === this) closeForm();
});

function changeQty(delta) {
  const input = document.getElementById('input-qty');
  const val = parseInt(input.value) + delta;
  if (val >= 1 && val <= 99) input.value = val;
}

function submitForm() {
  const name = document.getElementById('input-name').value.trim();
  const date = document.getElementById('input-date').value;
  const category = document.getElementById('input-category').value;
  const qty = parseInt(document.getElementById('input-qty').value) || 1;
  const note = document.getElementById('input-note').value.trim();
  const barcode = document.getElementById('input-barcode').value.trim();

  if (!name) { showToast('請填寫商品名稱'); return; }
  if (!date) { showToast('請選擇到期日'); return; }

  const item = {
    id: Date.now().toString(),
    name, date, category, qty, note, barcode,
    addedAt: new Date().toISOString()
  };

  items.unshift(item);
  saveItems();
  render();
  closeForm();
  showToast('已新增: ' + name);
}
